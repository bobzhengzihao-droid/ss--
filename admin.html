        function runQuery() {
            queryLoading = true; queryResults = null; queryError = null; renderQuery();
            setTimeout(function() {
                try {
                    queryResults = computeQuery();
                    queryLoading = false;
                } catch(e) {
                    queryLoading = false;
                    queryResults = null;
                    queryError = e.message || String(e);
                    console.error('Query error:', e);
                }
                renderQuery();
            }, 100);
        }

        function computeQuery() {
            var results = [];
            var condition = queryCondition;
            var subject = querySubject;
            var customNum = queryCustomNum || 0;
            var customText = (queryCustomText || '').trim();

            // === 出勤专用分支 ===
            if (subject === '出勤') {
                Object.values(allTeachers).forEach(function(t) {
                    if (queryTeacher !== 'all' && t.id !== queryTeacher) return;
                    var classes = Array.isArray(t.classes) ? t.classes : [];
                    var fb = t.feedback || {};
                    var classMap = {};
                    classes.forEach(function(c) { classMap[c.id] = c; });

                    // Group fb keys by class
                    var perClass = {};
                    Object.keys(fb).forEach(function(k) {
                        var cid = k.split('|')[0];
                        if (!classMap[cid]) return;
                        if (!perClass[cid]) perClass[cid] = [];
                        perClass[cid].push(k);
                    });

                    Object.keys(perClass).forEach(function(cid) {
                        var cls = classMap[cid];
                        if (queryClass !== 'all' && cls.name.toLowerCase().indexOf(queryClass.toLowerCase()) === -1) return;
                        if (!classContainsGrade(cls.name, queryGrade)) return;
                        var allKeys = perClass[cid].sort(naturalSort);
                        var keys = allKeys;
                        if (queryRecent !== 'all') {
                            keys = allKeys.slice(-parseInt(queryRecent));
                        }
                        if (!keys.length || !cls.students) return;
                        // 排除老师提前建的空白课次
                        keys = keys.filter(function(k) { return isLessonActive(fb[k]); });
                        if (!keys.length) return;

                        cls.students.forEach(function(s) {
                            var present = 0;
                            keys.forEach(function(k) {
                                if (isStudentPresent(fb[k], s)) present++;
                            });
                            var rate = Math.round(present / keys.length * 100);
                            results.push({
                                key: cid + '|' + s,
                                name: s, className: cls.name, classId: cid,
                                teacherName: t.name || t.email || '', teacherId: t.id,
                                present: present, total: keys.length, rate: rate,
                                details: keys.map(function(k) {
                                    return { date: k.split('|').slice(1).join('|'), present: isStudentPresent(fb[k], s) };
                                })
                            });
                        });
                    });
                });

                // Sort: highest attendance first
                results.sort(function(a, b) { return b.rate - a.rate || b.total - a.total; });
                if (queryLimit !== 'all') results = results.slice(0, parseInt(queryLimit));
                return results;
            }

            // === 其他科目的原有逻辑 ===
            Object.values(allTeachers).forEach(function(t) {
                if (queryTeacher !== 'all' && t.id !== queryTeacher) return;
                var classes = Array.isArray(t.classes) ? t.classes : [];
                var fb = t.feedback || {};
                var classMap = {};
                classes.forEach(function(c) { classMap[c.id] = c; });

                // Collect all fb keys, optionally filter to recent N per class
                var fbKeys = Object.keys(fb);
                if (queryRecent !== 'all') {
                    var recentN = parseInt(queryRecent);
                    var perClass = {};
                    fbKeys.forEach(function(k) {
                        var cid = k.split('|')[0];
                        if (!perClass[cid]) perClass[cid] = [];
                        perClass[cid].push(k);
                    });
                    fbKeys = [];
                    Object.keys(perClass).forEach(function(cid) {
                        perClass[cid].sort(naturalSort);
                        var keys = perClass[cid].slice(-recentN);
                        fbKeys = fbKeys.concat(keys);
                    });
                }
                fbKeys.forEach(function(k) {
                    var parts = k.split('|');
                    if (parts.length < 2) return;
                    var classId = parts[0];
                    var dateLabel = parts.slice(1).join('|');
                    var cls = classMap[classId];
                    if (!cls) return;
                    // Class type filter
                    if (queryClass !== 'all' && cls.name.toLowerCase().indexOf(queryClass.toLowerCase()) === -1) return;
                    if (!classContainsGrade(cls.name, queryGrade)) return;

                    var entry = fb[k];
                    if (!entry || !entry.dateColumns) return;

                    // Find column matching subject
                    var colIdx = -1, maxScore = 0;
                    for (var ci = 0; ci < entry.dateColumns.length; ci++) {
                        if (columnContainsKeyword(entry.dateColumns[ci], subject)) {
                            colIdx = ci;
                            maxScore = extractMaxScore(entry.dateColumns[ci]);
                            break;
                        }
                    }
                    if (colIdx === -1) return;

                    var recs = entry.records || [];
                    recs.forEach(function(rec) {
                        if (!rec || !rec.values) return;
                        var val = rec.values[colIdx];
                        if (val === '' || val === null || val === undefined) return;
                        var strVal = String(val).trim();
                        var matched = false;
                        var score = convertToNumber(val, maxScore);

                        if (condition === 'perfect') {
                            // Scored column only: value equals maxScore
                            if (maxScore > 0 && score >= maxScore) matched = true;
                            // Non-scored column (✅ marks): treat as "已完成"
                            if (maxScore === 0 && (strVal === '✅' || strVal === '已完成' || strVal === '✓' || strVal === '✔' || strVal === 'A+' || strVal === 'A++')) matched = true;
                        } else if (condition === 'greater') {
                            if (maxScore > 0 && score > customNum) matched = true;
                        } else if (condition === 'marked') {
                            if (strVal === 'A+' || strVal === 'A++' || strVal === '✅' || strVal === '已完成' || strVal === '✓' || strVal === '✔') matched = true;
                        } else if (condition === 'custom') {
                            if (customText && strVal === customText) matched = true;
                        }

                        if (!matched) return;

                        // Find or create result entry
                        var key = classId + '|' + rec.name;
                        var existing = results.find(function(r) { return r.key === key; });
                        if (!existing) {
                            existing = {
                                key: key, name: rec.name, className: cls.name, classId: classId,
                                teacherName: t.name || t.email || '', teacherId: t.id,
                                count: 0, totalScore: 0, maxSeen: 0, minSeen: Infinity, latestScore: 0, latestDate: '',
                                perfectCount: 0,
                                details: []
                            };
                            results.push(existing);
                        }
                        existing.count++;
                        existing.totalScore += score;
                        if (maxScore > 0 && score >= maxScore) existing.perfectCount++;
                        if (score > existing.maxSeen) existing.maxSeen = score;
                        if (score < existing.minSeen) existing.minSeen = score;
                        if (dateLabel > existing.latestDate) { existing.latestDate = dateLabel; existing.latestScore = score; }
                        existing.details.push({ date: dateLabel, score: score, maxScore: maxScore, raw: strVal });
                    });
                });
            });

            // Compute averages
            results.forEach(function(r) {
                r.avgScore = r.count > 0 ? Math.round(r.totalScore / r.count * 10) / 10 : 0;
                r.perfectRate = r.count > 0 ? Math.round(r.perfectCount / r.count * 100) : 0;
                if (r.minSeen === Infinity) r.minSeen = 0;
            });

            // Sort
            var sortField = querySort || 'count_desc';
            if (sortField === 'avg_desc') {
                results.sort(function(a, b) { return b.avgScore - a.avgScore || b.count - a.count; });
            } else if (sortField === 'perfect_desc') {
                results.sort(function(a, b) { return b.perfectCount - a.perfectCount || b.perfectRate - a.perfectRate; });
            } else if (sortField === 'perfect_rate_desc') {
                results.sort(function(a, b) { return b.perfectRate - a.perfectRate || b.perfectCount - a.perfectCount; });
            } else {
                // count_desc
                results.sort(function(a, b) { return b.count - a.count || b.avgScore - a.avgScore; });
            }

            // Limit
            if (queryLimit !== 'all') {
                results = results.slice(0, parseInt(queryLimit));
            }

            return results;
        }

        function renderQueryResults() {
            if (!queryResults || !queryResults.length) return '<div class="card"><div class="empty-state">未找到符合条件的学生</div></div>';
            var isAttendance = querySubject === '出勤';
            var scoredSubs = ['听写', '小测', '小书童'];
            var isScored = scoredSubs.indexOf(querySubject) >= 0;
            var showPerfect = ['听写', '小测'].indexOf(querySubject) >= 0;
            var html = '<div class="card"><div class="card-title" style="justify-content:space-between"><span>共找到 ' + queryResults.length + ' 名学生</span></div>';
            html += '<div class="table-wrap"><table><thead><tr><th>排名</th><th>学生</th><th>班级</th><th>教师</th>';
            if (isAttendance) {
                html += '<th>出勤</th><th>总课次</th><th>出勤率</th>';
            } else {
                html += '<th>次数</th>';
                if (isScored && showPerfect) { html += '<th>满分次数</th><th>满分率</th><th>最高</th><th>最低</th>'; }
                else if (isScored && !showPerfect) { html += '<th>最高</th><th>最低</th><th>均分</th>'; }
                else { html += '<th>完成率</th>'; }
            }
            html += '</tr></thead><tbody>';
            queryResults.forEach(function(r, i) {
                var badge = '';
                if (!isAttendance && i === 0) badge = '🥇';
                else if (!isAttendance && i === 1) badge = '🥈';
                else if (!isAttendance && i === 2) badge = '🥉';
                html += '<tr>';
                html += '<td style="font-size:14px;">' + badge + (badge ? ' ' : '') + (i + 1) + '</td>';
                html += '<td style="font-weight:600;cursor:pointer;color:var(--accent);" onclick="showStudentDetail(\'' + r.key + '\')">' + escapeHtml(r.name) + '</td>';
                html += '<td>' + escapeHtml(r.className) + '</td>';
                html += '<td style="color:var(--text-muted)">' + escapeHtml(r.teacherName) + '</td>';
                if (isAttendance) {
                    var rateNum = r.rate || 0;
                    var color = rateNum >= 100 ? 'var(--success)' : rateNum >= 80 ? 'var(--accent)' : rateNum >= 60 ? '#f59e0b' : 'var(--danger)';
                    html += '<td>' + r.present + '</td>';
                    html += '<td>' + r.total + '</td>';
                    html += '<td style="font-weight:700;color:' + color + ';">' + r.rate + '%</td>';
                } else {
                    html += '<td style="font-weight:600;">' + r.count + '</td>';
                    if (isScored && showPerfect) {
                        html += '<td style="font-weight:700;color:var(--success);">' + (r.perfectCount || 0) + '</td>';
                        html += '<td>' + (r.perfectRate || 0) + '%</td>';
                        html += '<td>' + r.maxSeen + '</td>';
                        html += '<td>' + r.minSeen + '</td>';
                    } else if (isScored && !showPerfect) {
                        html += '<td>' + r.maxSeen + '</td>';
                        html += '<td>' + r.minSeen + '</td>';
                        html += '<td style="font-weight:700;color:var(--accent);">' + r.avgScore + '</td>';
                    } else {
                        var rate = Math.round(r.avgScore * 100);
                        html += '<td style="font-weight:700;color:' + (rate >= 90 ? 'var(--success)' : rate >= 70 ? 'var(--accent)' : 'var(--danger)') + ';">' + rate + '%</td>';
                    }
                }
                html += '</tr>';
            });
            html += '</tbody></table></div></div>';
            return html;
        }

        window.showStudentDetail = function(key) {
            var r = queryResults.find(function(x) { return x.key === key; });
            if (!r) return;
            var isAttendance = querySubject === '出勤';
            var scoredSubs = ['听写', '小测', '小书童'];
            var isScored = scoredSubs.indexOf(querySubject) >= 0;
            var showPerfect = ['听写', '小测'].indexOf(querySubject) >= 0;
            var html = '<div style="position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;" onclick="this.remove()">';
            html += '<div style="background:var(--card-bg);border-radius:var(--radius);padding:20px;max-width:500px;width:90%;max-height:70vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);" onclick="event.stopPropagation()">';
            html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
            html += '<span style="font-weight:700;font-size:16px;">' + escapeHtml(r.name) + ' <span style="color:var(--text-muted);font-size:13px;">' + escapeHtml(r.className) + ' · ' + escapeHtml(r.teacherName) + '</span></span>';
            html += '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);">&times;</button>';
            html += '</div>';
            if (isAttendance) {
                html += '<table style="width:100%;font-size:12px;"><thead><tr><th>课次</th><th>出勤</th></tr></thead><tbody>';
                r.details.sort(function(a, b) { return naturalSort(a.date, b.date); });
                r.details.forEach(function(d) {
                    html += '<tr><td>' + escapeHtml(d.date) + '</td><td style="font-weight:600;color:' + (d.present ? 'var(--success)' : 'var(--danger)') + ';">' + (d.present ? '✅ 到场' : '❌ 缺勤') + '</td></tr>';
                });
                html += '</tbody></table>';
            } else if (isScored && showPerfect) {
                html += '<div style="margin-bottom:8px;font-size:12px;color:var(--text-muted);">满分次数：<b style="color:var(--success);">' + (r.perfectCount || 0) + '</b> / ' + r.count + '（满分率 ' + (r.perfectRate || 0) + '%）</div>';
                html += '<table style="width:100%;font-size:12px;"><thead><tr><th>课次</th><th>得分</th><th>满分</th></tr></thead><tbody>';
                r.details.sort(function(a, b) { return naturalSort(a.date, b.date); });
                r.details.forEach(function(d) {
                    var isPerfect = d.maxScore > 0 && d.score >= d.maxScore;
                    html += '<tr><td>' + escapeHtml(d.date) + '</td><td style="font-weight:600;color:' + (isPerfect ? 'var(--success)' : '') + ';">' + escapeHtml(d.raw) + (isPerfect ? ' 💯' : '') + '</td><td style="color:var(--text-muted);">' + (d.maxScore || '-') + '</td></tr>';
                });
                html += '</tbody></table>';
            } else {
                html += '<table style="width:100%;font-size:12px;"><thead><tr><th>课次</th><th>得分</th></tr></thead><tbody>';
                r.details.sort(function(a, b) { return naturalSort(a.date, b.date); });
                r.details.forEach(function(d) {
                    html += '<tr><td>' + escapeHtml(d.date) + '</td><td style="font-weight:600;">' + escapeHtml(d.raw) + '</td></tr>';
                });
                html += '</tbody></table>';
            }
            html += '</div></div>';
            var overlay = document.createElement('div');
            overlay.innerHTML = html;
            document.body.appendChild(overlay.firstElementChild);
        };

        window.exportQueryResults = function() {
            if (!queryResults || !queryResults.length) return;
            var isAttendance = querySubject === '出勤';
            var scoredSubs = ['听写', '小测', '小书童'];
            var isScored = scoredSubs.indexOf(querySubject) >= 0;
            var showPerfect = ['听写', '小测'].indexOf(querySubject) >= 0;
            var headers;
            if (isAttendance) {
                headers = ['排名', '学生', '班级', '教师', '出勤次数', '总课次', '出勤率'];
            } else if (isScored && showPerfect) {
                headers = ['排名', '学生', '班级', '教师', '次数', '满分次数', '满分率', '最高分', '最低分'];
            } else if (isScored && !showPerfect) {
                headers = ['排名', '学生', '班级', '教师', '次数', '最高分', '最低分', '均分'];
            } else {
                headers = ['排名', '学生', '班级', '教师', '次数', '完成率'];
            }
            var rows = [headers];
            queryResults.forEach(function(r, i) {
                if (isAttendance) {
                    rows.push([String(i + 1), r.name, r.className, r.teacherName, String(r.present), String(r.total), r.rate + '%']);
                } else if (isScored && showPerfect) {
                    rows.push([String(i + 1), r.name, r.className, r.teacherName, String(r.count), String(r.perfectCount || 0), (r.perfectRate || 0) + '%', String(r.maxSeen), String(r.minSeen)]);
                } else if (isScored && !showPerfect) {
                    rows.push([String(i + 1), r.name, r.className, r.teacherName, String(r.count), String(r.maxSeen), String(r.minSeen), String(r.avgScore)]);
                } else {
                    rows.push([String(i + 1), r.name, r.className, r.teacherName, String(r.count), String(Math.round(r.avgScore * 100)) + '%']);
                }
            });
            var ws = XLSX.utils.aoa_to_sheet(rows);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, sanitizeSheetName(querySubject + '查询结果'));
            XLSX.writeFile(wb, '查询_' + querySubject + '_' + new Date().toISOString().slice(0, 10) + '.xlsx');
        };

        // ========== Export ==========
        window.smartExport = function() {
            // Context-aware export: what can we export right now?
            if (currentView === 'data' && currentTeacherId && currentClassId && currentLesson) {
                exportLesson(currentTeacherId, currentClassId, currentLesson);
            } else if (currentView === 'data' && currentTeacherId && currentClassId) {
                exportClass(currentTeacherId, currentClassId);
            } else if (currentView === 'data' && currentTeacherId) {
                exportTeacher(currentTeacherId);
            } else if (currentView === 'analysis' && analysisTeacherId && analysisClassId) {
                exportClass(analysisTeacherId, analysisClassId);
            } else if (currentView === 'teachers') {
                exportDashboard();
            } else {
                exportDashboard();
            }
        };

        function updateExportLabel() {
            const btn = document.getElementById('exportBtn');
            if (!btn) return; // 顶部导出按钮已移除，此函数保留兼容
            const icon = '<i class="iconfont icon-download"></i> ';
            if (currentView === 'analysis' && analysisTeacherId && analysisClassId) {
                btn.innerHTML = icon + '导出此班级';
            } else if (currentView === 'awards' && awardsTeacherId && awardsClassId) {
                btn.innerHTML = icon + '导出汇总';
            } else {
                btn.innerHTML = icon + '导出汇总';
            }
        }

        function exportDashboard() {
            const rows = [['教师', '班级', '学生数', '课次数', '最后活跃']];
            Object.values(allTeachers).forEach(t => {
                const classes = Array.isArray(t.classes) ? t.classes : [];
                const lessons = Object.keys(t.feedback || {}).length;
                if (classes.length) {
                    classes.forEach(c => {
                        const clsLessons = Object.keys(t.feedback || {}).filter(k => k.startsWith(c.id + '|')).length;
                        rows.push([t.name || '', c.name || '', String(c.students ? c.students.length : 0), String(clsLessons), t.lastActive || '']);
                    });
                } else {
                    rows.push([t.name || '', '-', '0', String(lessons), t.lastActive || '']);
                }
            });
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '教师汇总');
            XLSX.writeFile(wb, '教师汇总_' + new Date().toISOString().slice(0,10) + '.xlsx');
        }

        function exportTeacher(teacherId) {
            const t = allTeachers[teacherId];
            if (!t) return;
            const classes = Array.isArray(t.classes) ? t.classes : [];
            const rows = [['教师', '班级', '学生数', '课次数']];
            classes.forEach(c => {
                const clsLessons = Object.keys(t.feedback || {}).filter(k => k.startsWith(c.id + '|')).length;
                rows.push([t.name || '', c.name || '', String(c.students ? c.students.length : 0), String(clsLessons)]);
            });
            if (!classes.length) {
                rows.push([t.name || '', '-', '0', String(Object.keys(t.feedback || {}).length)]);
            }
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            var sheetName = sanitizeSheetName((t.name || '教师') + '_班级汇总');
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
            XLSX.writeFile(wb, (sanitizeSheetName(t.name || '教师')) + '_班级汇总_' + new Date().toISOString().slice(0,10) + '.xlsx');
        }

        function exportClass(teacherId, classId) {
            const t = allTeachers[teacherId];
            if (!t) return;
            const classes = Array.isArray(t.classes) ? t.classes : [];
            const cls = classes.find(c => c.id === classId);
            if (!cls) return;

            // Collect all columns across all lessons
            const fbKeys = Object.keys(t.feedback || {}).filter(k => k.startsWith(classId + '|')).sort(naturalSort);
            const allCols = new Set();
            fbKeys.forEach(k => {
                const fb = t.feedback[k];
                const cols = (fb && fb.dateColumns) ? fb.dateColumns : [];
                cols.forEach(c => allCols.add(stripMaxScore(c)));
            });
            const columns = Array.from(allCols).sort(naturalSort);

            if (!fbKeys.length) {
                // No feedback data: export just student list
                const rows = [['学生']];
                (cls.students || []).forEach(s => rows.push([s]));
                const ws = XLSX.utils.aoa_to_sheet(rows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, sanitizeSheetName(cls.name));
                XLSX.writeFile(wb, sanitizeSheetName(t.name || '') + '_' + sanitizeSheetName(cls.name) + '_学生名单_' + new Date().toISOString().slice(0,10) + '.xlsx');
                return;
            }

            // Long-table format: each row = student + lesson + score
            const rows = [['学生', '课次'].concat(columns)];
            (cls.students || []).forEach(student => {
                fbKeys.forEach(k => {
                    const dateLabel = k.substring(classId.length + 1);
                    const fb = t.feedback[k];
                    const row = [student, dateLabel];
                    columns.forEach(colName => {
                        let val = '';
                        if (fb && fb.dateColumns) {
                            const idx = fb.dateColumns.findIndex(c => columnContainsKeyword(c, colName));
                            if (idx !== -1) {
                                const rec = (fb.records || []).find(r => r.name === student);
                                if (rec && rec.values) val = rec.values[idx] || '';
                            }
                        }
                        row.push(val);
                    });
                    rows.push(row);
                });
            });
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, sanitizeSheetName(cls.name));
            XLSX.writeFile(wb, sanitizeSheetName(t.name || '') + '_' + sanitizeSheetName(cls.name) + '_反馈明细_' + new Date().toISOString().slice(0,10) + '.xlsx');
        }

        function exportLesson(teacherId, classId, lessonKey) {
            const t = allTeachers[teacherId];
            if (!t) return;
            const classes = Array.isArray(t.classes) ? t.classes : [];
            const cls = classes.find(c => c.id === classId);
            if (!cls) return;
            const fbKey = classId + '|' + lessonKey;
            const fb = t.feedback[fbKey];
            const columns = (fb && fb.dateColumns) ? fb.dateColumns.map(c => stripMaxScore(c)) : [];

            const rows = [['学生'].concat(columns)];
            (cls.students || []).forEach(student => {
                const rec = (fb && fb.records) ? fb.records.find(r => r.name === student) : null;
                const row = [student];
                columns.forEach((_, ci) => {
                    row.push(rec && rec.values ? (rec.values[ci] || '') : '');
                });
                rows.push(row);
            });
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, sanitizeSheetName(lessonKey));
            XLSX.writeFile(wb, sanitizeSheetName(t.name || '') + '_' + sanitizeSheetName(cls.name) + '_' + sanitizeSheetName(lessonKey) + '_' + new Date().toISOString().slice(0,10) + '.xlsx');
        };

        // Expose state for inline onclick handlers
        (function() {
            var _vars = {
                get currentTeacherId() { return currentTeacherId; },
                set currentTeacherId(v) { currentTeacherId = v; },
                get currentClassId() { return currentClassId; },
                set currentClassId(v) { currentClassId = v; },
                get currentLesson() { return currentLesson; },
                set currentLesson(v) { currentLesson = v; },
                get analysisTeacherId() { return analysisTeacherId; },
                set analysisTeacherId(v) { analysisTeacherId = v; },
                get analysisClassId() { return analysisClassId; },
                set analysisClassId(v) { analysisClassId = v; },
                get analysisSelCols() { return analysisSelCols; },
                set analysisSelCols(v) { analysisSelCols = v; },
                get analysisSelStudent() { return analysisSelStudent; },
                set analysisSelStudent(v) { analysisSelStudent = v; },
                get awardsTeacherId() { return awardsTeacherId; },
                set awardsTeacherId(v) { awardsTeacherId = v; },
                get awardsClassId() { return awardsClassId; },
                set awardsClassId(v) { awardsClassId = v; },
                get awardsRange() { return awardsRange; },
                set awardsRange(v) { awardsRange = v; },
                get querySubject() { return querySubject; },
                set querySubject(v) { querySubject = v; },
                get queryCondition() { return queryCondition; },
                set queryCondition(v) { queryCondition = v; },
                get queryCustomNum() { return queryCustomNum; },
                set queryCustomNum(v) { queryCustomNum = v; },
                get queryCustomText() { return queryCustomText; },
                set queryCustomText(v) { queryCustomText = v; },
                get queryRecent() { return queryRecent; },
                set queryRecent(v) { queryRecent = v; },
                get queryTeacher() { return queryTeacher; },
                set queryTeacher(v) { queryTeacher = v; },
                get queryClass() { return queryClass; },
                set queryClass(v) { queryClass = v; },
                get queryGrade() { return queryGrade; },
                set queryGrade(v) { queryGrade = v; },
                get querySort() { return querySort; },
                set querySort(v) { querySort = v; },
                get queryLimit() { return queryLimit; },
                set queryLimit(v) { queryLimit = v; }
            };
            Object.defineProperties(window, Object.getOwnPropertyDescriptors(_vars));
        })();

        init();
    })();
    </script>
