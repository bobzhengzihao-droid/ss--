<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理者后台 · 班级反馈表</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #1e293b; --accent: #2563eb; --accent-light: #93c5fd;
            --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --text-light: #64748b;
            --text-muted: #94a3b8; --border: #e2e8f0; --border-light: #f1f5f9;
            --shadow: 0 1px 3px rgba(0,0,0,0.04); --shadow-md: 0 4px 6px rgba(0,0,0,0.05);
            --radius: 14px; --radius-sm: 10px; --btn-radius: 9999px;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
            --table-header-bg: #eff6ff; --table-header-text: #1e40af; --table-border: #bfdbfe;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); max-width: 960px; margin: 0 auto;
            padding: 8px 12px 40px; min-height: 100vh;
        }
        .login-gate {
            display: flex; align-items: center; justify-content: center; min-height: 70vh;
            flex-direction: column; gap: 12px; text-align: center;
        }
        .login-gate .msg { font-size: 15px; color: var(--text-light); line-height: 1.8; }
        .login-gate .msg a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .login-gate .msg .err { color: var(--danger); font-size: 13px; }

        /* Top Bar */
        .topbar {
            display: flex; align-items: center; gap: 8px; padding: 10px 14px;
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: var(--shadow-md); margin-bottom: 10px; flex-wrap: wrap;
        }
        .topbar-title { font-weight: 700; font-size: 15px; white-space: nowrap; }
        .search-input {
            flex: 1; min-width: 100px; padding: 7px 12px; border-radius: var(--btn-radius);
            border: 1.5px solid var(--border); font-size: 12px; background: var(--bg); outline: none;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn {
            padding: 7px 14px; border-radius: var(--btn-radius); border: none;
            font-size: 12px; font-weight: 600; cursor: pointer; background: var(--accent);
            color: white; white-space: nowrap; transition: 0.15s;
        }
        .btn:hover { opacity: 0.9; } .btn:active { transform: scale(0.96); }
        .btn-sm { padding: 5px 12px; font-size: 11px; }
        .btn-outline { background: var(--card-bg); color: var(--accent); border: 1.5px solid var(--accent); }

        /* Subtabs */
        .subtabs {
            display: flex; gap: 4px; background: var(--card-bg); border-radius: var(--btn-radius);
            padding: 4px; box-shadow: var(--shadow); margin-bottom: 12px;
        }
        .subtab {
            flex: 1; text-align: center; padding: 8px 10px; border-radius: var(--btn-radius);
            font-weight: 600; font-size: 12px; color: var(--text-light); cursor: pointer;
            background: transparent; border: none; transition: 0.15s; white-space: nowrap;
        }
        .subtab:hover { color: var(--accent); background: #eff6ff; }
        .subtab.active { background: linear-gradient(135deg, #2563eb, #3b82f6); color: white; box-shadow: 0 2px 8px rgba(37,99,235,0.3); }
        .subview { display: none; animation: fadeIn 0.2s ease-out; }
        .subview.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

        /* Cards */
        .card { background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); margin-bottom: 10px; }
        .card-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .card-title::before { content:''; width:4px; height:16px; background:var(--accent); border-radius:2px; }
        .empty-state { text-align: center; padding: 30px 20px; color: var(--text-muted); font-size: 13px; }

        /* Stat Grid */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 14px; }
        .stat-card { background: var(--card-bg); border-radius: var(--radius-sm); padding: 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px; }
        .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .stat-value { font-size: 22px; font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-muted); }

        /* Teacher list */
        .t-item {
            background: var(--card-bg); border-radius: var(--radius-sm); padding: 10px 14px;
            margin-bottom: 8px; box-shadow: var(--shadow); cursor: pointer;
            border-left: 3px solid var(--accent); transition: 0.15s;
        }
        .t-item:hover { box-shadow: var(--shadow-md); }
        .t-header { display: flex; justify-content: space-between; align-items: center; }
        .t-name { font-weight: 600; font-size: 14px; }
        .t-meta { font-size: 11px; color: var(--text-muted); }
        .t-detail { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 12px; }
        .t-detail.open { display: block; }
        .t-class-item { padding: 6px 10px; margin: 4px 0; background: var(--bg); border-radius: 8px; cursor: pointer; transition: 0.1s; }
        .t-class-item:hover { background: #eff6ff; }

        /* Tables */
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: var(--table-header-bg); color: var(--table-header-text); padding: 8px 10px; border: 1px solid var(--table-border); text-align: center; font-weight: 600; white-space: nowrap; position: sticky; top: 0; }
        td { padding: 6px 8px; border: 1px solid var(--table-border); text-align: center; }
        tr:nth-child(even) td { background: #fafbfc; }

        /* Breadcrumb */
        .breadcrumb { display: flex; gap: 4px; align-items: center; font-size: 12px; margin-bottom: 8px; color: var(--text-light); flex-wrap: wrap; }
        .breadcrumb span { cursor: pointer; color: var(--accent); }
        .breadcrumb span:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
    (function() {
        const SUPABASE_URL = 'https://furpcqytmgxqkxlbselj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1cnBjcXl0bWd4cWt4bGJzZWxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjYyNTYsImV4cCI6MjA5NDIwMjI1Nn0.522KmI4GJrghlteeQiRVMGJdytu3R4pf7E1NLyTByzE';

        let supabase;
        let currentUser = null;
        let isAdmin = false;
        let allTeachers = {};
        let searchQuery = '';
        let currentView = 'dashboard';
        let currentTeacherId = null;
        let currentClassId = null;
        let currentLesson = null;
        let activeChart = null;

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function naturalSort(a,b) { const re=/(\d+)/g, aP=a.split(re).filter(Boolean), bP=b.split(re).filter(Boolean); for(let i=0;i<Math.max(aP.length,bP.length);i++){const av=aP[i]||'',bv=bP[i]||'',an=parseInt(av,10),bn=parseInt(bv,10); if(!isNaN(an)&&!isNaN(bn)){if(an!==bn)return an-bn;} else if(av!==bv)return av.localeCompare(bv);} return 0; }
        function stripMaxScore(c) { c = c.replace(/（/g, '(').replace(/）/g, ')'); return c.replace(/\(.*\)/, '').trim(); }

        // ========== Init ==========
        async function init() {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                document.getElementById('app').innerHTML = `<div class="login-gate"><div class="msg">请先在主站登录<br><br><a href="/">← 返回主站登录</a></div></div>`;
                return;
            }
            currentUser = session.user;

            // Check if admin
            const { data: profile } = await supabase.from('teacher_profiles')
                .select('is_admin').eq('user_id', currentUser.id).maybeSingle();
            isAdmin = profile && profile.is_admin;

            if (!isAdmin) {
                const name = currentUser.user_metadata?.name || currentUser.email;
                document.getElementById('app').innerHTML = `<div class="login-gate"><div class="msg">仅管理员可访问<br><br>当前账号：${escapeHtml(name)}<br><br><a href="/">← 返回主站</a></div></div>`;
                return;
            }

            await loadAllData();
            renderApp();
            switchView('dashboard');
        }

        // ========== Data ==========
        async function loadAllData() {
            allTeachers = {};
            // Admin RLS policy allows reading all rows
            const { data: allRows, error } = await supabase.from('data_store').select('*');
            if (error) { console.error('Load error:', error); return; }

            const userMap = {};
            (allRows || []).forEach(row => {
                if (!userMap[row.user_id]) {
                    userMap[row.user_id] = { id: row.user_id, name: '', email: '', classes: [], feedback: {}, lastActive: '' };
                }
                const u = userMap[row.user_id];
                if (row.key === '_profile') {
                    try { const p = typeof row.value === 'string' ? JSON.parse(row.value) : row.value;
                        u.name = p.name || ''; u.email = p.email || ''; u.lastActive = p.updated || ''; } catch(e) {}
                }
                if (row.key === 'classes') {
                    try { u.classes = JSON.parse(typeof row.value === 'string' ? row.value : JSON.stringify(row.value)); } catch(e) {}
                }
                if (row.key === 'feedback') {
                    try { u.feedback = JSON.parse(typeof row.value === 'string' ? row.value : JSON.stringify(row.value)); } catch(e) {}
                }
            });

            Object.entries(userMap).forEach(([id, u]) => {
                if (u.classes.length > 0 || Object.keys(u.feedback).length > 0 || u.name) {
                    allTeachers[id] = u;
                }
            });
        }

        // ========== Render ==========
        function renderApp() {
            document.getElementById('app').innerHTML = `
                <div class="topbar">
                    <button class="btn btn-sm btn-outline" onclick="window.location.href='/'">← 返回</button>
                    <span class="topbar-title">⚙ 管理者后台</span>
                    <input class="search-input" id="searchInput" type="text" placeholder="🔍 搜索教师..." oninput="onSearch(this.value)">
                    <button class="btn btn-sm" onclick="refresh()">🔄 刷新</button>
                    <button class="btn btn-sm btn-outline" onclick="exportExcel()">📊 导出</button>
                    <button class="btn btn-sm" style="background:#1e293b" onclick="logout()">🚪 退出</button>
                </div>
                <div class="subtabs">
                    <button class="subtab active" data-view="dashboard" onclick="switchView('dashboard')">📊 概览</button>
                    <button class="subtab" data-view="teachers" onclick="switchView('teachers')">👥 教师</button>
                    <button class="subtab" data-view="data" onclick="switchView('data')">📋 数据</button>
                </div>
                <div id="view-dashboard" class="subview active"></div>
                <div id="view-teachers" class="subview"></div>
                <div id="view-data" class="subview"></div>
            `;
        }

        window.switchView = function(view) {
            currentView = view;
            document.querySelectorAll('.subtab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.subtab[data-view="${view}"]`)?.classList.add('active');
            document.querySelectorAll('.subview').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + view)?.classList.add('active');
            if (activeChart) { activeChart.destroy(); activeChart = null; }

            if (view === 'dashboard') renderDashboard();
            else if (view === 'teachers') renderTeachers();
            else if (view === 'data') renderDataBrowser();
        };

        window.onSearch = function(q) { searchQuery = q.toLowerCase(); if (currentView === 'teachers') renderTeachers(); };

        window.refresh = async function() {
            document.getElementById('searchInput').value = ''; searchQuery = '';
            await loadAllData();
            switchView(currentView);
        };

        window.logout = async function() {
            await supabase.auth.signOut();
            window.location.href = '/';
        };

        // ========== Dashboard ==========
        function renderDashboard() {
            const teachers = Object.values(allTeachers);
            const totalClasses = teachers.reduce((s, t) => s + (Array.isArray(t.classes) ? t.classes.length : 0), 0);
            const totalStudents = teachers.reduce((s, t) => {
                return s + (Array.isArray(t.classes) ? t.classes.reduce((ss, c) => ss + (c.students ? c.students.length : 0), 0) : 0);
            }, 0);
            const totalLessons = teachers.reduce((s, t) => s + Object.keys(t.feedback || {}).length, 0);

            // Recent activity
            const recent = teachers.filter(t => t.lastActive).sort((a,b) => b.lastActive.localeCompare(a.lastActive)).slice(0, 8);

            let html = `
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-icon" style="background:#eff6ff">👥</div><div><div class="stat-value">${teachers.length}</div><div class="stat-label">教师总数</div></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#f0fdf4">🏫</div><div><div class="stat-value">${totalClasses}</div><div class="stat-label">班级总数</div></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#fef3c7">🧑‍🎓</div><div><div class="stat-value">${totalStudents}</div><div class="stat-label">学生总数</div></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#fce7f3">📝</div><div><div class="stat-value">${totalLessons}</div><div class="stat-label">反馈课次</div></div></div>
                </div>
                <div class="card"><div class="card-title">🕐 最近活跃</div>
                    ${recent.length ? recent.map(t => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:12px"><span>${escapeHtml(t.name || t.email || '未命名')}</span><span style="color:var(--text-muted)">${t.lastActive ? new Date(t.lastActive).toLocaleString('zh-CN') : '-'}</span></div>`).join('') : '<div class="empty-state">暂无数据</div>'}
                </div>
            `;

            document.getElementById('view-dashboard').innerHTML = html;
        }

        // ========== Teachers ==========
        function renderTeachers() {
            let teachers = Object.values(allTeachers);
            if (searchQuery) {
                teachers = teachers.filter(t =>
                    (t.name || '').toLowerCase().includes(searchQuery) ||
                    (t.email || '').toLowerCase().includes(searchQuery)
                );
            }
            teachers.sort((a,b) => (b.lastActive || '').localeCompare(a.lastActive || ''));

            const html = teachers.length ? teachers.map(t => {
                const clsCount = Array.isArray(t.classes) ? t.classes.length : 0;
                const fbCount = Object.keys(t.feedback || {}).length;
                return `
                    <div class="t-item" id="tcard-${t.id}">
                        <div class="t-header" onclick="toggleTeacherDetail('${t.id}')">
                            <div>
                                <div class="t-name">${escapeHtml(t.name || '未命名')}</div>
                                <div class="t-meta">${clsCount} 班级 · ${fbCount} 课次 · ${t.email || ''}${t.lastActive ? ' · 最后活跃 ' + new Date(t.lastActive).toLocaleString('zh-CN') : ''}</div>
                            </div>
                            <span style="font-size:18px;color:var(--text-muted)">›</span>
                        </div>
                        <div class="t-detail" id="tdetail-${t.id}"></div>
                    </div>
                `;
            }).join('') : '<div class="empty-state">暂无教师数据</div>';

            document.getElementById('view-teachers').innerHTML = html;
        }

        window.toggleTeacherDetail = function(id) {
            const detail = document.getElementById('tdetail-' + id);
            const isOpen = detail.classList.contains('open');
            // Close all
            document.querySelectorAll('.t-detail.open').forEach(d => d.classList.remove('open'));
            if (!isOpen) {
                detail.classList.add('open');
                renderTeacherDetail(id);
            }
        };

        function renderTeacherDetail(id) {
            const t = allTeachers[id];
            if (!t) return;
            const classes = Array.isArray(t.classes) ? t.classes : [];
            const fbKeys = Object.keys(t.feedback || {}).sort(naturalSort);

            let html = '';
            classes.forEach(cls => {
                const prefix = cls.id + '|';
                const clsFb = fbKeys.filter(k => k.startsWith(prefix));
                const studentCount = cls.students ? cls.students.length : 0;
                html += `<div class="t-class-item" onclick="browseTeacherData('${id}','${cls.id}')">
                    📋 ${escapeHtml(cls.name)} — ${studentCount} 学生 · ${clsFb.length} 课次
                </div>`;
            });

            if (!classes.length) html = '<div class="empty-state">暂无班级</div>';
            document.getElementById('tdetail-' + id).innerHTML = html;
        }

        // ========== Data Browser ==========
        window.browseTeacherData = function(teacherId, classId) {
            currentTeacherId = teacherId;
            currentClassId = classId;
            currentLesson = null;
            switchView('data');
        };

        function renderDataBrowser() {
            const t = allTeachers[currentTeacherId];
            if (!t) {
                // Show teacher list to pick from
                const teachers = Object.values(allTeachers).filter(u => (Array.isArray(u.classes) ? u.classes.length : 0) > 0);
                let html = '<div class="card"><div class="card-title">选择教师</div>';
                html += teachers.length ? teachers.map(u => {
                    return (Array.isArray(u.classes) ? u.classes : []).map(cls =>
                        `<div class="t-class-item" onclick="browseTeacherData('${u.id}','${cls.id}')">👤 ${escapeHtml(u.name || u.email || '未命名')} → 📋 ${escapeHtml(cls.name)}</div>`
                    ).join('');
                }).join('') : '<div class="empty-state">暂无数据</div>';
                html += '</div>';
                document.getElementById('view-data').innerHTML = html;
                return;
            }

            const classes = Array.isArray(t.classes) ? t.classes : [];
            const cls = classes.find(c => c.id === currentClassId);
            const fbKeys = Object.keys(t.feedback || {}).filter(k => k.startsWith(currentClassId + '|')).sort(naturalSort);

            let html = `
                <div class="breadcrumb">
                    <span onclick="currentTeacherId=null;renderDataBrowser()">教师列表</span> ›
                    ${cls ? `<span onclick="currentClassId=null;renderDataBrowser()">${escapeHtml(t.name || '未命名')}</span>` : escapeHtml(t.name || '未命名')} ›
                    ${cls ? escapeHtml(cls.name) : '选择班级'}
                </div>
            `;

            if (!cls) {
                // Show class list for this teacher
                html += '<div class="card"><div class="card-title">选择班级</div>';
                html += classes.map(c =>
                    `<div class="t-class-item" onclick="browseTeacherData('${t.id}','${c.id}')">📋 ${escapeHtml(c.name)} — ${c.students ? c.students.length : 0} 学生</div>`
                ).join('');
                html += '</div>';
            } else if (!currentLesson) {
                // Show lesson list
                html += `<div class="card"><div class="card-title">📋 ${escapeHtml(cls.name)} — 课次列表（${fbKeys.length}）</div>`;
                html += fbKeys.length ? fbKeys.map(k => {
                    const label = k.substring(currentClassId.length + 1);
                    const fb = t.feedback[k];
                    const recCount = fb && fb.records ? fb.records.length : (fb && Array.isArray(fb) ? fb.length : 0);
                    return `<div class="t-class-item" onclick="currentLesson='${label}';renderDataBrowser()">📅 ${escapeHtml(label)} — ${recCount} 条记录</div>`;
                }).join('') : '<div class="empty-state">该班级暂无反馈</div>';
                html += '</div>';
            } else {
                // Show feedback table
                const fbKey = currentClassId + '|' + currentLesson;
                const fb = t.feedback[fbKey];
                html += `<div class="breadcrumb">
                    <span onclick="currentTeacherId=null;renderDataBrowser()">教师列表</span> ›
                    <span onclick="currentClassId=null;renderDataBrowser()">${escapeHtml(t.name || '')}</span> ›
                    <span onclick="currentLesson=null;renderDataBrowser()">${escapeHtml(cls.name)}</span> ›
                    ${escapeHtml(currentLesson)}
                </div>`;
                html += `<div class="card"><div class="card-title">📅 ${escapeHtml(currentLesson)}</div>`;

                if (!fb || (!fb.records && !Array.isArray(fb))) {
                    html += '<div class="empty-state">该课次无数据</div>';
                } else {
                    const records = fb.records || fb;
                    const columns = fb.dateColumns || cls.columns || [];
                    html += '<div class="table-wrap"><table><thead><tr><th>学生</th>';
                    columns.forEach(c => html += `<th>${escapeHtml(stripMaxScore(c))}</th>`);
                    html += '</tr></thead><tbody>';
                    (cls.students || []).forEach(name => {
                        const rec = Array.isArray(records) ? records.find(r => r.name === name) : null;
                        html += `<tr><td>${escapeHtml(name)}</td>`;
                        columns.forEach((col, ci) => {
                            const val = rec && rec.values ? (rec.values[ci] || '') : '';
                            const bg = rec && rec.colors ? (rec.colors[ci] || '') : '';
                            html += `<td style="background:${bg}">${escapeHtml(String(val))}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table></div>';
                }
                html += '</div>';
            }

            document.getElementById('view-data').innerHTML = html;
        }

        window.exportExcel = function() {
            const rows = [['教师', '班级', '学生数', '课次数', '最后活跃']];
            Object.values(allTeachers).forEach(t => {
                const classes = Array.isArray(t.classes) ? t.classes : [];
                const lessons = Object.keys(t.feedback || {}).length;
                if (classes.length) {
                    classes.forEach(c => {
                        rows.push([t.name || '', c.name || '', String(c.students ? c.students.length : 0), '', '']);
                    });
                    // Summary row
                    rows[rows.length - 1][3] = String(Object.keys(t.feedback || {}).filter(k => {
                        const prefix = classes[0].id + '|';
                        return classes.some(c => k.startsWith(c.id + '|'));
                    }).length);
                } else {
                    rows.push([t.name || '', '-', '0', String(lessons), t.lastActive || '']);
                }
            });

            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '教师数据');
            XLSX.writeFile(wb, '管理者数据_' + new Date().toISOString().slice(0,10) + '.xlsx');
        };

        init();
    })();
    </script>
