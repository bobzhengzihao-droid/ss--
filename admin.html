<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理者后台 · 班级反馈表</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #1e293b; --accent: #2563eb; --accent-light: #93c5fd;
            --bg: #f5f7fa; --card-bg: #ffffff; --text: #1e293b; --text-light: #64748b;
            --text-muted: #94a3b8; --border: #e2e8f0; --border-light: #f1f5f9;
            --shadow: 0 1px 3px rgba(0,0,0,0.04); --shadow-md: 0 4px 6px rgba(0,0,0,0.05);
            --radius: 14px; --radius-sm: 10px; --btn-radius: 9999px;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
            --table-header-bg: #eff6ff; --table-header-text: #1e40af; --table-border: #bfdbfe;
            --sidebar-w: 220px; --sidebar-collapsed-w: 56px; --sidebar-bg: #ffffff; --sidebar-text: #64748b; --sidebar-active: #2563eb;
        }
        [data-theme="dark"] {
            --primary: #f1f5f9; --accent: #60a5fa; --accent-light: #93c5fd;
            --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --text-light: #cbd5e1;
            --text-muted: #94a3b8; --border: #475569; --border-light: #334155;
            --shadow: 0 1px 3px rgba(0,0,0,0.4); --shadow-md: 0 4px 6px rgba(0,0,0,0.5);
            --table-header-bg: #1e3a5f; --table-header-text: #bfdbfe; --table-border: #475569;
            --sidebar-bg: #1e293b; --sidebar-text: #cbd5e1; --sidebar-active: #60a5fa;
        }
        /* Dark mode overrides for hardcoded light backgrounds */
        [data-theme="dark"] .sidebar-nav a:hover,
        [data-theme="dark"] .sidebar-nav a.active,
        [data-theme="dark"] .subtab:hover,
        [data-theme="dark"] .t-class-item:hover {
            background: #1e3a5f !important;
        }
        [data-theme="dark"] tr:nth-child(even) td { background: rgba(255,255,255,0.04) !important; }
        [data-theme="dark"] .detail-table th { background: rgba(255,255,255,0.06); }
        [data-theme="dark"] .stat-icon { filter: none; }
        [data-theme="dark"] .stat-icon .iconfont { color: #1e293b; }
        [data-theme="dark"] select,
        [data-theme="dark"] input,
        [data-theme="dark"] textarea {
            color: var(--text);
        }
        [data-theme="dark"] select option {
            background: var(--card-bg); color: var(--text);
        }
        /* Disable default View Transitions crossfade */
        ::view-transition-new(root),
        ::view-transition-old(root) {
            animation: none !important;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            transition: background-color 0.35s ease, color 0.35s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .sidebar, .card, .stat-card, .topbar, .t-item, .detail-card, .custom-dialog,
        .search-input, .detail-table th, .tag-capsule, .t-class-item {
            transition: background-color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease, color 0.35s ease;
        }
        .notransition,
        .notransition *,
        .notransition::view-transition-new,
        .notransition::view-transition-old {
            transition: none !important;
        }
        /* ===== Layout ===== */
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--sidebar-bg);
            display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0;
            z-index: 100; overflow: hidden;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1), min-width 0.35s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s ease;
            border-right: 1px solid var(--border-light); box-shadow: 2px 0 8px rgba(0,0,0,0.03);
        }
        .nav-label { transition: opacity 0.2s 0.08s cubic-bezier(0.4, 0, 0.2, 1), max-width 0.3s 0.08s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; display: inline-block; max-width: 200px; vertical-align: middle; }
        .sidebar.collapsed .nav-label { opacity: 0; max-width: 0; }
        .sidebar-logo { padding: 12px 16px; font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; height: 50px; box-sizing: border-box; white-space: nowrap; overflow: hidden; }
        .sidebar-logo .iconfont { font-size: 20px; color: var(--accent); }
        .theme-toggle {
            margin-left: auto; background: var(--bg); border: 1px solid var(--border);
            border-radius: 9999px; width: 32px; height: 32px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 16px; transition: all 0.35s ease;
            flex-shrink: 0; line-height: 1; padding: 0; color: var(--text);
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
        .theme-toggle:active { transform: scale(0.9); }
        .sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--sidebar-text);
            text-decoration: none; font-size: 13px; font-weight: 500; cursor: pointer;
            border-left: 3px solid transparent; white-space: nowrap;
            transition: padding 0.35s cubic-bezier(0.4, 0, 0.2, 1), background 0.15s, color 0.15s;
        }
        .sidebar-nav a:hover { color: var(--accent); background: #eff6ff; }
        .sidebar-nav a.active { color: var(--accent); background: #eff6ff; border-left-color: var(--sidebar-active); font-weight: 600; }
        .sidebar-nav a .iconfont { font-size: 16px; }
        .sidebar-emoji { display: inline-block; width: 16px; text-align: center; font-size: 14px; }
        .sidebar-bottom { padding: 8px 0; border-top: 1px solid var(--border-light); }
        .sidebar-bottom a {
            display: flex; align-items: center; gap: 10px; padding: 9px 20px; color: var(--sidebar-text);
            text-decoration: none; font-size: 13px; cursor: pointer; white-space: nowrap;
            transition: padding 0.35s cubic-bezier(0.4, 0, 0.2, 1), background 0.15s, color 0.15s;
        }
        .sidebar-bottom a:hover { color: var(--accent); }
        .sidebar-bottom a .iconfont { font-size: 16px; }
        .sidebar-bottom a .icon-settings { font-size: 17px; }
        .admin-badge { margin-left: auto; font-size: 10px; background: var(--bg); color: var(--text-muted); padding: 2px 8px; border-radius: 10px; }
        .sidebar.collapsed { width: var(--sidebar-collapsed-w); min-width: var(--sidebar-collapsed-w); }
        .sidebar.collapsed .sidebar-nav a { border-left-width: 0; }
        .sidebar.collapsed .admin-badge { display: none; }
        .main-area.sidebar-collapsed { margin-left: var(--sidebar-collapsed-w); }
        .main-area { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-height: 100vh; transition: margin-left 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .topbar {
            display: flex; align-items: center; gap: 10px; padding: 10px 18px; background: var(--card-bg);
            border-bottom: 1px solid var(--border-light); position: sticky; top: 0; z-index: 50; flex-wrap: wrap;
            min-height: 50px; box-sizing: border-box;
        }
        .topbar-title { font-weight: 700; font-size: 14px; white-space: nowrap; display: none; }
        .search-input {
            flex: 1; min-width: 120px; padding: 7px 12px; border-radius: var(--btn-radius);
            border: 1.5px solid var(--border); font-size: 12px; background: var(--bg); outline: none;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .hamburger { display: flex; align-items: center; justify-content: center; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text); padding: 4px; width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; }
        .hamburger:hover { background: var(--bg); color: var(--accent); }
        .hamburger:active { transform: scale(0.9); }
        .content-area { flex: 1; padding: 14px 18px 20px; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }
        /* Mobile bottom nav */
        .mobile-nav {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg);
            box-shadow: 0 -1px 6px rgba(0,0,0,0.06); z-index: 90; padding: 4px 0 env(safe-area-inset-bottom, 0);
        }
        .mobile-nav-inner { display: flex; }
        .mobile-nav a {
            flex: 1; text-align: center; padding: 6px 2px 4px; color: var(--text-muted); text-decoration: none;
            font-size: 10px; font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer;
        }
        .mobile-nav a .iconfont { font-size: 18px; }
        .mobile-nav a.active { color: var(--accent); }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar.collapsed { width: var(--sidebar-w); min-width: var(--sidebar-w); }

            .sidebar.collapsed .nav-label { opacity: 1; max-width: 200px; }
            .sidebar-overlay.open { display: block; }
            .main-area { margin-left: 0; }
            .main-area.sidebar-collapsed { margin-left: 0; }
            .hamburger { display: flex; }
            .topbar-title { display: none; }
            .topbar .btn { padding: 5px 10px; font-size: 11px; }
            .topbar .search-input { font-size: 11px; padding: 5px 8px; }
            .content-area { padding: 8px 8px 70px; }
            .mobile-nav { display: block; }
            .sidebar-bottom { display: none; }
        }
        @media (min-width: 769px) {
            .sidebar-overlay.open { display: none; }
        }
        .login-gate {
            display: flex; align-items: center; justify-content: center; min-height: 70vh;
            flex-direction: column; gap: 12px; text-align: center;
        }
        .login-gate .msg { font-size: 15px; color: var(--text-light); line-height: 1.8; }
        .login-gate .msg a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .login-gate .msg .err { color: var(--danger); font-size: 13px; }

        .topbar-title { font-weight: 700; font-size: 15px; white-space: nowrap; }
        .search-input {
            flex: 1; min-width: 100px; padding: 7px 12px; border-radius: var(--btn-radius);
            border: 1.5px solid var(--border); font-size: 12px; background: var(--bg); outline: none;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn {
            padding: 7px 14px; border-radius: var(--btn-radius); border: none;
            font-size: 12px; font-weight: 600; cursor: pointer; background: var(--accent);
            color: white; white-space: nowrap; transition: 0.15s;
        }
        .btn:hover { opacity: 0.9; } .btn:active { transform: scale(0.96); }
        .btn-sm { padding: 5px 12px; font-size: 11px; }
        .btn-outline { background: var(--card-bg); color: var(--accent); border: 1.5px solid var(--accent); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { opacity: 0.9; }

        .subtabs {
            display: flex; gap: 4px; background: var(--card-bg); border-radius: var(--btn-radius);
            padding: 4px; box-shadow: var(--shadow); margin-bottom: 12px; overflow-x: auto;
        }
        .subtab {
            flex: 1; text-align: center; padding: 8px 6px; border-radius: var(--btn-radius);
            font-weight: 600; font-size: 12px; color: var(--text-light); cursor: pointer;
            background: transparent; border: none; transition: 0.15s; white-space: nowrap;
        }
        .subtab:hover { color: var(--accent); background: #eff6ff; }
        .subtab.active { background: linear-gradient(135deg, #2563eb, #3b82f6); color: white; box-shadow: 0 2px 8px rgba(37,99,235,0.3); }
        .subview { display: none; animation: fadeIn 0.2s ease-out; }
        .subview.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

        .card { background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); margin-bottom: 10px; }
        .card-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .card-title::before { content:''; width:4px; height:16px; background:var(--accent); border-radius:2px; }
        .empty-state { text-align: center; padding: 30px 20px; color: var(--text-muted); font-size: 13px; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 14px; }
        .stat-card { background: var(--card-bg); border-radius: var(--radius-sm); padding: 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid transparent; }
        .stat-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.1); transform: translateY(-3px); border-color: var(--accent-light); }
        .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .stat-value { font-size: 22px; font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-muted); }

        .t-item {
            background: var(--card-bg); border-radius: var(--radius-sm); padding: 10px 14px;
            margin-bottom: 8px; box-shadow: var(--shadow); cursor: pointer;
            border-left: 3px solid var(--accent); transition: 0.15s;
        }
        .t-item:hover { box-shadow: var(--shadow-md); }
        .t-header { display: flex; justify-content: space-between; align-items: center; }
        .t-name { font-weight: 600; font-size: 14px; }
        .t-meta { font-size: 11px; color: var(--text-muted); }
        .t-detail { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 12px; }
        .t-detail.open { display: block; }
        .t-class-item { padding: 6px 10px; margin: 4px 0; background: var(--bg); border-radius: 8px; cursor: pointer; transition: 0.1s; }
        .t-class-item:hover { background: #eff6ff; }
        .t-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border-light); }

        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: var(--table-header-bg); color: var(--table-header-text); padding: 8px 10px; border: 1px solid var(--table-border); text-align: center; font-weight: 600; white-space: nowrap; }
        td { padding: 6px 8px; border: 1px solid var(--table-border); text-align: center; }
        tr:nth-child(even) td { background: #fafbfc; }

        .breadcrumb { display: flex; gap: 4px; align-items: center; font-size: 12px; margin-bottom: 8px; color: var(--text-light); flex-wrap: wrap; }
        .breadcrumb span { cursor: pointer; color: var(--accent); }
        .breadcrumb span:hover { text-decoration: underline; }

        .login-box {
            max-width: 340px; margin: 60px auto 0; background: var(--card-bg);
            border-radius: var(--radius); padding: 24px 20px; box-shadow: var(--shadow-md); text-align: center;
        }
        .login-box h2 { font-size: 1.2rem; margin-bottom: 16px; }
        .login-input {
            width: 100%; padding: 10px 14px; border-radius: var(--btn-radius);
            border: 1.5px solid var(--border); font-size: 14px; margin-bottom: 8px;
            outline: none; background: var(--bg);
        }
        .login-input:focus { border-color: var(--accent); }
        .login-btn {
            width: 100%; padding: 10px; border-radius: var(--btn-radius); border: none;
            background: var(--accent); color: white; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px;
        }
        .login-btn:active { transform: scale(0.97); }
        .login-msg { font-size: 12px; margin-top: 8px; min-height: 16px; }
        .login-msg.error { color: var(--danger); }
        .login-msg.success { color: var(--success); }

        /* Custom Dialog */
        .custom-dialog-overlay {
            position: fixed; inset: 0; z-index: 99999; background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .custom-dialog {
            background: var(--card-bg); border-radius: 16px; padding: 20px;
            width: 90%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; gap: 14px;
        }
        .custom-dialog-msg { font-size: 14px; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
        .custom-dialog-input {
            padding: 10px 14px; border-radius: 12px; border: 1.5px solid var(--border);
            font-size: 14px; outline: none; width: 100%;
        }
        .custom-dialog-input:focus { border-color: var(--accent); }
        .custom-dialog-btns { display: flex; gap: 8px; justify-content: flex-end; }
        .custom-dialog-btn-ok {
            padding: 8px 24px; border-radius: 9999px; border: none;
            background: var(--accent); color: white; font-weight: 600; cursor: pointer;
        }
        .custom-dialog-btn-cancel {
            padding: 8px 24px; border-radius: 9999px; border: 1.5px solid var(--border);
            background: var(--card-bg); color: var(--text-light); font-weight: 600; cursor: pointer;
        }

        /* ===== Detail Modal ===== */
        .detail-overlay {
            position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.25s ease-out;
        }
        .detail-card {
            background: var(--card-bg); border-radius: var(--radius); padding: 0;
            width: 92%; max-width: 640px; max-height: 75vh; display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92) translateY(12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .detail-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 24px; border-bottom: 1px solid var(--border-light); flex-shrink: 0;
        }
        .detail-header-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .detail-close {
            background: none; border: none; font-size: 22px; color: var(--text-muted);
            cursor: pointer; padding: 4px 8px; border-radius: 8px; line-height: 1; transition: 0.15s;
        }
        .detail-close:hover { background: var(--bg); color: var(--text); }
        .detail-body { flex: 1; overflow-y: auto; padding: 18px 24px; -webkit-overflow-scrolling: touch; }
        .detail-footer {
            padding: 12px 24px; border-top: 1px solid var(--border-light); flex-shrink: 0;
            text-align: right;
        }
        .detail-footer a {
            color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .detail-footer a:hover { text-decoration: underline; }
        .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .detail-table th { text-align: left; padding: 10px 12px; background: #f8fafc; color: var(--text-light); font-weight: 600; font-size: 12px; border-bottom: 1px solid var(--border); }
        .detail-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); }
        .detail-table tr:last-child td { border-bottom: none; }
        .detail-table .num { text-align: center; }
        .tag-capsule {
            display: inline-block; padding: 4px 10px; margin: 3px; font-size: 12px;
            background: var(--bg); border: 1px solid var(--border); border-radius: 9999px;
            color: var(--text); white-space: nowrap;
        }
        .tag-group { display: flex; flex-wrap: wrap; gap: 0; padding: 4px 0; }
        .detail-group { margin-bottom: 16px; }
        .detail-group-label { font-size: 13px; font-weight: 600; color: var(--text-light); margin-bottom: 6px; }
        @media (max-width: 768px) {
            .detail-card { width: calc(100% - 24px); margin: 12px; max-height: 75vh; }
            .detail-body { padding: 10px 12px; }
            .detail-header { padding: 10px 14px; }
            .detail-footer { padding: 8px 14px; }
        }

        /* Analysis */
        .analysis-selector { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
        .analysis-selector select {
            padding: 6px 10px; border-radius: var(--btn-radius); border: 1.5px solid var(--border);
            font-size: 12px; background: var(--bg); outline: none;
        }
        .analysis-selector select:focus { border-color: var(--accent); }
        .check-group { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; font-size: 12px; }
        .check-group label { display: flex; align-items: center; gap: 3px; cursor: pointer; }
        .chart-container { height: 260px; margin-top: 12px; }

        // ========== Theme ==========
        function initTheme() {
            const saved = localStorage.getItem('admin-theme');
            if (saved) {
                applyTheme(saved);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                applyTheme('dark');
            }
        }
        function toggleTheme() {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            const rect = btn.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const next = current === 'dark' ? 'light' : 'dark';

            // Radius to furthest viewport corner
            const radius = Math.hypot(
                Math.max(cx, window.innerWidth - cx),
                Math.max(cy, window.innerHeight - cy)
            );

            // Suppress CSS transitions during View Transition to prevent flash
            document.documentElement.classList.add('notransition');

            if (!document.startViewTransition) {
                applyTheme(next);
                localStorage.setItem('admin-theme', next);
                document.documentElement.classList.remove('notransition');
                return;
            }

            var transition = document.startViewTransition(function() {
                applyTheme(next);
                localStorage.setItem('admin-theme', next);
            });

            transition.ready.then(function() {
                document.documentElement.classList.remove('notransition');

                // 移动端跳过圆圈动画，用原生渐变过渡（sticky 定位下坐标会错位）
                if (window.innerWidth <= 768) return;

                var clipPath = [
                    'circle(0px at ' + cx + 'px ' + cy + 'px)',
                    'circle(' + radius + 'px at ' + cx + 'px ' + cy + 'px)'
                ];

                document.documentElement.animate(
                    { clipPath: clipPath },
                    {
                        duration: 400,
                        easing: 'ease-in',
                        pseudoElement: '::view-transition-new(root)'
                    }
                );
            });

            // Clean up transition lock on finish/cancel
            transition.finished.finally(function() {
                document.documentElement.classList.remove('notransition');
            });
        }
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            var btn = document.getElementById('themeToggle');
            if (btn) {
                var icon = btn.querySelector('i');
                if (icon) {
                    icon.className = 'iconfont3 ' + (theme === 'dark' ? 'icon-sun' : 'icon-moon');
                }
            }
        }
        window.toggleTheme = toggleTheme;
        initTheme();

        // ========== Utilities ==========
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function naturalSort(a,b) { const re=/(\d+)/g, aP=a.split(re).filter(Boolean), bP=b.split(re).filter(Boolean); for(let i=0;i<Math.max(aP.length,bP.length);i++){const av=aP[i]||'',bv=bP[i]||'',an=parseInt(av,10),bn=parseInt(bv,10); if(!isNaN(an)&&!isNaN(bn)){if(an!==bn)return an-bn;} else if(av!==bv)return av.localeCompare(bv);} return 0; }
        function stripMaxScore(c) { c = c.replace(/（/g, '(').replace(/）/g, ')'); return c.replace(/\(.*\)/, '').trim(); }
        function columnContainsKeyword(colName, keyword) {
            const nc = colName.replace(/\s+/g, '').toLowerCase();
            const nk = keyword.replace(/\s+/g, '').toLowerCase();
            return nc.includes(nk);
        }
        function extractMaxScore(colName) {
            colName = colName.replace(/（/g, '(').replace(/）/g, ')');
            const m = colName.match(/满分\s*(\d+)/);
            return m ? parseInt(m[1]) : 0;
        }
        function convertToNumber(value, maxScore) {
            if (value === '' || value === null || value === undefined) return null;
            const str = String(value).trim();
            if (str === 'A++' || str === 'A+') return maxScore > 0 ? maxScore : 1;
            if (str === 'A') return maxScore > 0 ? Math.round(90/100*maxScore) : 1;
            if (str === 'A-') return maxScore > 0 ? Math.round(80/100*maxScore) : 1;
            if (str === '✅' || str === '已完成' || str === '✓' || str === '✔') return maxScore > 0 ? maxScore : 1;
            if (str === '✗' || str === '×' || str === '✘' || str === '❌' || str === '未完成') return 0;
            const num = parseInt(str, 10); return isNaN(num) ? 0 : num;
        }
        // 出勤判定：排除「小书童」「小学堂」「语音作业」「备注」，任一有效列有值即算到场
        function isStudentPresent(entry, studentName) {
            const excluded = ['小书童', '小学堂', '语音作业', '备注'];
            const recs = entry.records || (Array.isArray(entry) ? entry : []);
            const rec = recs.find(function(r) { return r.name === studentName; });
            if (!rec || !rec.values) return false;
            if (!entry.dateColumns) return false;
            return entry.dateColumns.some(function(col, i) {
                if (excluded.some(function(kw) { return columnContainsKeyword(col, kw); })) return false;
                var v = rec.values[i];
                return v !== '' && v !== null && v !== undefined;
            });
        }
        // 该课次是否至少有一个学生有有效数据（排除同样的列）
        function isLessonActive(entry) {
            const excluded = ['小书童', '小学堂', '语音作业', '备注'];
            if (!entry || !entry.dateColumns) return false;
            const recs = entry.records || (Array.isArray(entry) ? entry : []);
            if (!recs.length) return false;
            return recs.some(function(rec) {
                if (!rec || !rec.values) return false;
                return entry.dateColumns.some(function(col, i) {
                    if (excluded.some(function(kw) { return columnContainsKeyword(col, kw); })) return false;
                    var v = rec.values[i];
                    return v !== '' && v !== null && v !== undefined;
                });
            });
        }
        function sanitizeSheetName(name) { return String(name).replace(/[:\\\/?*\[\]]/g, '-').replace(/^['']/g, '').replace(/['']$/g, '').substring(0, 31); }
        // Check if class name contains the given grade (supports Arabic 1-6 and Chinese 一二三四五六)
        function classContainsGrade(className, grade) {
            if (grade === 'all') return true;
            var chineseMap = { '1': '一', '2': '二', '3': '三', '4': '四', '5': '五', '6': '六' };
            var arabic = String(grade);
            var chinese = chineseMap[arabic] || '';
            var arabicRegex = new RegExp(arabic + '(年级|年|级|班|[A-Za-z])');
            var chineseRegex = chinese ? new RegExp(chinese + '(年级|年|级|班)') : null;
            return arabicRegex.test(className) || (chineseRegex && chineseRegex.test(className));
        }
        // Build dynamic subject list from actual column names across all feedback data
        function getDynamicSubjects() {
            var subjectSet = {};
            var scoredSet = {};
            Object.values(allTeachers).forEach(function(t) {
                var fb = t.feedback || {};
                Object.values(fb).forEach(function(entry) {
                    if (entry && entry.dateColumns) {
                        entry.dateColumns.forEach(function(col) {
                            var name = stripMaxScore(col);
                            if (name && name !== '备注') {
                                subjectSet[name] = true;
                                if (extractMaxScore(col) > 0) scoredSet[name] = true;
                            }
                        });
                    }
                });
            });
            var subjects = Object.keys(subjectSet).sort(function(a, b) {
                // Scored subjects first, then alphabetical
                var aScored = scoredSet[a] ? 0 : 1;
                var bScored = scoredSet[b] ? 0 : 1;
                if (aScored !== bScored) return aScored - bScored;
                return a.localeCompare(b);
            });
            subjects.push('出勤');
            return { subjects: subjects, scoredSubs: Object.keys(scoredSet) };
        }
        function getAutoBackground(val, maxScore) {
            if (val === '' || val === null || val === undefined) return '';
            const str = String(val).trim();
            if (str === '✗' || str === '×' || str === '✘' || str === '❌' || str === '未完成') return '#f8d7da';
            if (str === '✅' || str === '已完成' || str === '✓' || str === '✔') return '#d4edda';
            if (str === 'A+' || str === 'A++') return '#d4edda';
            if (str === 'A') return '#e8f5e9';
            const num = parseInt(str, 10);
            if (!isNaN(num) && maxScore > 0) {
                const pct = num / maxScore;
                if (pct >= 1) return '#d4edda';
                if (pct >= 0.8) return '#e8f5e9';
                if (pct <= 0) return '#f8d7da';
            }
            return '';
        }

        function showConfirm(msg) {
            return new Promise(resolve => {
                const overlay = document.createElement('div'); overlay.className = 'custom-dialog-overlay';

        function showPrompt(msg, defaultVal) {
            return new Promise(resolve => {
                const overlay = document.createElement('div'); overlay.className = 'custom-dialog-overlay';

                overlay.querySelector('.custom-dialog-btn-ok').onclick = ok;
                overlay.querySelector('.custom-dialog-btn-cancel').onclick = cancel;

                document.body.appendChild(overlay);
                setTimeout(() => { input.focus(); input.select(); }, 80);
            });
        }

        async function callAuthAdmin(method, path, body) {
            const url = SUPABASE_URL.replace('.co', '.co') + '/auth/v1/admin' + path;
            const headers = { 'Authorization': 'Bearer ' + SERVICE_ROLE_KEY, 'apikey': SERVICE_ROLE_KEY, 'Content-Type': 'application/json' };
            const opts = { method, headers };
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(url, opts);
            if (!resp.ok) {
                let msg = '';
                try { const d = await resp.json(); msg = d.message || d.msg || ''; } catch(e) {}
                throw new Error(msg || 'Admin API error: ' + resp.status);
            }
            if (resp.status === 204) return null;
            return await resp.json();
        }

        // ========== Login Form ==========
        function showLoginForm() {
            document.getElementById('app').innerHTML = `
                <div class="login-box">
                    <h2><i class="iconfont icon-settings"></i> 管理者登录</h2>

            `;
            document.getElementById('adminLoginPwd').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleAdminLogin(); });

        window.handleAdminLogin = async function() {
            const name = document.getElementById('adminLoginName').value.trim();
            const password = document.getElementById('adminLoginPwd').value;
            const msgEl = document.getElementById('adminLoginMsg');
            const btn = document.getElementById('adminLoginBtn');
            msgEl.textContent = ''; msgEl.className = 'login-msg';
            if (!name || !password) { msgEl.textContent = '请填写姓名和密码'; msgEl.className = 'login-msg error'; return; }
            btn.disabled = true; btn.textContent = '登录中...';
            try {
                const emailCandidates = [];
                const savedEmail = localStorage.getItem('_fb_name_email_' + name);
                if (savedEmail) emailCandidates.push(savedEmail);
                if (name.includes('@')) emailCandidates.push(name);
                let hash = ''; const normalized = name.trim().replace(/\s+/g, '');
                for (let i = 0; i < normalized.length; i++) hash += normalized.charCodeAt(i).toString();
                emailCandidates.push('t_' + hash.slice(0, 12) + '@teacher.fb');
                emailCandidates.push('t_' + hash.slice(0, 12) + '@bobo.run');
                let lastError;
                for (const email of [...new Set(emailCandidates)]) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (!error) { currentUser = data.user; localStorage.setItem('_fb_name_email_' + name, email); await checkAndEnter(); return; }
                    lastError = error;
                }
                throw lastError || new Error('登录失败');
            } catch(e) {
                msgEl.textContent = e.message || '姓名或密码错误'; msgEl.className = 'login-msg error';
            } finally { btn.disabled = false; btn.textContent = '登 录'; }
        };

        // ========== Data ==========
        async function loadAllData() {
            allTeachers = {};
            const hdrs = { 'apikey': SERVICE_ROLE_KEY, 'Authorization': 'Bearer ' + SERVICE_ROLE_KEY };

            // 1. Load data_store (bypasses RLS via service_role)
            const dsResp = await fetch(SUPABASE_URL + '/rest/v1/data_store?select=*', { headers: hdrs });
            if (!dsResp.ok) { console.error('data_store load error:', dsResp.status); return; }
            const allRows = await dsResp.json();

            // 2. Load teacher_profiles for name/email lookup + admin status
            let profiles = {};
            try {
                const tpResp = await fetch(SUPABASE_URL + '/rest/v1/teacher_profiles?select=user_id,name,is_admin', { headers: hdrs });
                if (tpResp.ok) {
                    const tpRows = await tpResp.json();
                    (tpRows || []).forEach(p => { if (p.user_id) profiles[p.user_id] = { name: p.name || '', isAdmin: !!p.is_admin }; });
                }
            } catch(e) { /* non-critical */ }

            const userMap = {};
            (allRows || []).forEach(row => {
                if (!userMap[row.user_id]) userMap[row.user_id] = { id: row.user_id, name: '', email: '', classes: [], feedback: {}, lastActive: '' };
                const u = userMap[row.user_id];
                if (row.key === '_profile') {
                    try { const p = typeof row.value === 'string' ? JSON.parse(row.value) : row.value;
                        u.name = p.name || ''; u.email = p.email || ''; u.lastActive = p.updated || ''; } catch(e) {}
                }
                if (row.key === 'classes') { try { u.classes = JSON.parse(typeof row.value === 'string' ? row.value : JSON.stringify(row.value)); } catch(e) {} }
                // 新格式：fb|classId|dateLabel（每课次独立 key）
                if (row.key && row.key.indexOf('fb|') === 0) {
                    try {
                        var fbKey = row.key.substring(3);
                        var entry = typeof row.value === 'string' ? JSON.parse(row.value) : row.value;
                        u.feedback[fbKey] = entry;
                    } catch(e) {}
                }
                // 旧格式：feedback 大 JSON（兼容）
                if (row.key === 'feedback') {
                    try {
                        var legacy = typeof row.value === 'string' ? JSON.parse(row.value) : row.value;
                        if (legacy && typeof legacy === 'object' && !Array.isArray(legacy)) {
                            Object.keys(legacy).forEach(function(k) {
                                if (!(k in u.feedback)) u.feedback[k] = legacy[k];
                            });
                        }
                    } catch(e) {}
                }
            });

            // Fill missing names from teacher_profiles + admin status
            Object.values(userMap).forEach(u => {
                var p = profiles[u.id];
                if (p) {
                    if (!u.name) u.name = p.name;
                    u.isAdmin = p.isAdmin;
                }
            });

            Object.entries(userMap).forEach(([id, u]) => {
                if (u.classes.length > 0 || Object.keys(u.feedback).length > 0 || u.name) allTeachers[id] = u;
            });
        }

        window.resetTeacherPassword = async function(teacherId) {
            const t = allTeachers[teacherId];
            if (!t) return;
            const newPwd = await showPrompt('请输入新密码（至少4位）：', '');
            if (newPwd === null) return;
            if (newPwd.length < 4) { await showConfirm('密码至少4位'); return; }
            const confirmPwd = await showPrompt('请再次输入新密码：', '');
            if (confirmPwd === null) return;
            if (newPwd !== confirmPwd) { await showConfirm('两次密码不一致'); return; }
            try {
                await callAuthAdmin('PUT', '/users/' + teacherId, { password: newPwd });
                await showConfirm('✅ 密码已重置，请将新密码告知 ' + (t.name || teacherId));
            } catch(e) { await showConfirm('重置失败：' + e.message); }
        };

        window.deleteTeacherAccount = async function(teacherId) {
            const t = allTeachers[teacherId];
            if (!t) return;
            const name = t.name || t.email || teacherId;
            const confirmed = await showConfirm('⚠️ 确定删除「' + name + '」的账号及全部数据？\n\n此操作不可撤销，将删除：\n  • 该老师的登录账号\n  • 所有班级、学生、反馈数据');
            if (!confirmed) return;
            try {
                try { await callAuthAdmin('DELETE', '/users/' + teacherId); } catch(e) { console.warn('Auth delete error:', e.message); }
                await supabase.from('data_store').delete().eq('user_id', teacherId);
                await supabase.from('teacher_profiles').delete().eq('user_id', teacherId);
                delete allTeachers[teacherId];
                document.getElementById('tdetail-' + teacherId)?.classList.remove('open');
                await showConfirm('✅ 已删除');

            } catch(e) { await showConfirm('删除失败：' + e.message); }
        };

        function buildTeachersModal(teachers) {
            const sorted = teachers.filter(t => t.lastActive).sort((a,b) => b.lastActive.localeCompare(a.lastActive));
            const noActive = teachers.filter(t => !t.lastActive);
            const all = sorted.concat(noActive);
            if (!all.length) return '<div class="empty-state">暂无教师数据</div>';
            let html = '<table class="detail-table"><thead><tr><th>教师</th><th class="num">班级数</th><th class="num">学生数</th><th>最近活跃</th></tr></thead><tbody>';
            all.forEach(t => {
                const clsCount = Array.isArray(t.classes) ? t.classes.length : 0;
                const stuCount = Array.isArray(t.classes) ? t.classes.reduce((s, c) => s + (c.students ? c.students.length : 0), 0) : 0;
                html += `<tr><td>${escapeHtml(t.name || t.email || '未命名')}</td><td class="num">${clsCount}</td><td class="num">${stuCount}</td><td>${t.lastActive ? new Date(t.lastActive).toLocaleString('zh-CN') : '<span style="color:var(--text-muted)">-</span>'}</td></tr>`;

        }

                });

                        html += `<span class="tag-capsule">${escapeHtml(typeof s === 'string' ? s : (s.name || String(s)))}</span>`;

                    html += '</div></div>';

        function buildLessonsModal(teachers) {
            const withLessons = teachers.map(t => ({ t, count: Object.keys(t.feedback || {}).length }));

                const dates = Object.keys(t.feedback || {}).sort();
                const lastDate = dates.length ? dates[dates.length - 1] : null;
                html += `<tr><td>${escapeHtml(t.name || t.email || '未命名')}</td><td class="num">${count}</td><td>${lastDate ? escapeHtml(lastDate) : '<span style="color:var(--text-muted)">-</span>'}</td></tr>`;

            html += '</tbody></table>';
            return html;

        function renderTeacherDetail(id) {
            const t = allTeachers[id];
            if (!t) return;
            const classes = Array.isArray(t.classes) ? t.classes : [];
            const fbKeys = Object.keys(t.feedback || {}).sort(naturalSort);
            let html = '';
            classes.forEach(cls => {

        // ========== Analysis ==========
        function getAnalysisFeedbackEntry(classId, dateLabel) {
            const t = allTeachers[analysisTeacherId];
            if (!t) return null;
            const fb = t.feedback || {};
            return fb[classId + '|' + dateLabel] || null;
        }

        function getAnalysisDateList(classId) {
            const t = allTeachers[analysisTeacherId];
            if (!t) return [];
            const prefix = classId + '|';
            return Object.keys(t.feedback || {}).filter(k => k.startsWith(prefix)).map(k => k.substring(prefix.length)).sort(naturalSort);
        }

        function renderAnalysis() {
            if (analysisChart) { analysisChart.destroy(); analysisChart = null; }
            if (!analysisTeacherId) {
                const teachers = Object.values(allTeachers).filter(u => (Array.isArray(u.classes) ? u.classes.length : 0) > 0 || Object.keys(u.feedback || {}).length > 0);
                if (!teachers.length) { document.getElementById('view-analysis').innerHTML = '<div class="empty-state">暂无数据</div>'; return; }
                let html = '<div class="card"><div class="card-title"><i class="iconfont icon-chart"></i> 选择教师</div>';
                teachers.forEach(u => {
                    var clsCount = Array.isArray(u.classes) ? u.classes.length : 0;
                    html += '<div class="t-item" onclick="analysisTeacherId=\'' + u.id + '\';renderAnalysis()"><div class="t-header"><div><div class="t-name">' + escapeHtml(u.name || u.email || '未命名') + '</div><div class="t-meta">' + clsCount + ' 班级 · ' + Object.keys(u.feedback || {}).length + ' 课次</div></div><span style="font-size:18px;color:var(--text-muted)">›</span></div></div>';
                });
                html += '</div>';
                document.getElementById('view-analysis').innerHTML = html; return;
            }
            const t = allTeachers[analysisTeacherId];
            if (!t) { analysisTeacherId = null; renderAnalysis(); return; }
            const classes = Array.isArray(t.classes) ? t.classes : [];
            if (!analysisClassId) {
                let html = `<div class="breadcrumb"><span onclick="analysisTeacherId=null;analysisClassId=null;renderAnalysis()">教师列表</span> › ${escapeHtml(t.name || '未命名')}</div>`;
                html += '<div class="card"><div class="card-title">选择班级</div>';
                html += classes.map(c => `<div class="t-class-item" onclick="analysisClassId='${c.id}';analysisSelCols=[];analysisSelStudent='';renderAnalysis()">📋 ${escapeHtml(c.name)} — ${c.students ? c.students.length : 0} 学生</div>`).join('');
                html += '</div>';
                document.getElementById('view-analysis').innerHTML = html; return;
            }
            const cls = classes.find(c => c.id === analysisClassId);
            if (!cls) { analysisClassId = null; renderAnalysis(); return; }
            const dates = getAnalysisDateList(analysisClassId);

            // Collect all unique columns across all dates
            const allCols = new Set();
            dates.forEach(d => {
                const entry = getAnalysisFeedbackEntry(analysisClassId, d);
                if (entry && entry.dateColumns) entry.dateColumns.forEach(c => allCols.add(c));
            });
            const columns = Array.from(allCols).sort(naturalSort);
            if (!analysisSelCols.length) analysisSelCols = columns.slice(0, Math.min(3, columns.length));

            let html = `<div class="breadcrumb">
                <span onclick="analysisTeacherId=null;analysisClassId=null;analysisSelCols=[];analysisSelStudent='';renderAnalysis()">教师列表</span> ›
                <span onclick="analysisClassId=null;analysisSelCols=[];analysisSelStudent='';renderAnalysis()">${escapeHtml(t.name || '')}</span> ›
                ${escapeHtml(cls.name)}
            </div>`;

            // Column selector
            html += `<div class="card"><div class="card-title">选择分析板块</div><div class="check-group" id="analysisColumnChecks">`;
            columns.forEach(col => {
                const checked = analysisSelCols.some(c => columnContainsKeyword(col, c));
                html += `<label><input type="checkbox" value="${escapeHtml(col)}" ${checked?'checked':''} onchange="refreshAnalysisView()"> ${escapeHtml(col)}</label>`;
            });
            html += `</div></div>`;

            // Stat table
            html += `<div class="card" id="analysisStatTable">${buildAnalysisStatTable(cls, dates, columns)}</div>`;

            // Student chart
            const students = cls.students || [];
            html += `<div class="card"><div class="card-title">📈 学生趋势</div>
                <div class="analysis-selector">
                    <select id="analysisStudentSelect" onchange="refreshAnalysisChart()">
                        <option value="">-- 请选择学生 --</option>
                        ${students.map(s => `<option value="${escapeHtml(s)}" ${s===analysisSelStudent?'selected':''}>${escapeHtml(s)}</option>`).join('')}
                    </select>
                </div>`;
            html += dates.length >= 2 ? `<div class="chart-container"><canvas id="analysisLineCanvas"></canvas></div>` : '<div style="font-size:12px;color:var(--text-muted);padding:12px">需要至少两次课次数据才能展示趋势图</div>';
            html += '</div>';

            document.getElementById('view-analysis').innerHTML = html;
            updateExportLabel();
            if (analysisSelStudent && dates.length >= 2) setTimeout(() => refreshAnalysisChart(), 100);
        }
        window.renderAnalysis = renderAnalysis;
        window.renderAwards = renderAwards;
        window.renderQuery = renderQuery;
        window.runQuery = runQuery;

        window.changeMyPassword = async function() {
            var p1 = await showPrompt('请输入新密码（至少4位）：', '');
            if (p1 === null) return;
            if (p1.length < 4) { await showConfirm('密码至少4位'); return; }
            var p2 = await showPrompt('请再次输入新密码：', '');
            if (p2 === null) return;
            if (p1 !== p2) { await showConfirm('两次密码不一致'); return; }
            var { error } = await supabase.auth.updateUser({ password: p1 });
            if (error) { await showConfirm('修改失败：' + error.message); return; }
            await showConfirm('密码已修改，下次登录请使用新密码');
        };

        function buildAnalysisStatTable(cls, dates, columns) {
            if (!analysisSelCols.length) return '<div class="empty-state">请选择至少一个分析板块</div>';
            if (!dates.length) return '<div class="empty-state">该班级暂无反馈数据</div>';

            let html = '';
            analysisSelCols.forEach((keyword, ki) => {
                html += `<h3 style="font-size:13px;margin:8px 0 4px;color:var(--accent)">📌 ${escapeHtml(keyword)} 学情统计</h3>`;
                html += '<div class="stat-table-wrap"><table><thead><tr><th style="width:60px">学生</th>';
                dates.forEach(d => html += `<th>${escapeHtml(d)}</th>`);
                html += '</tr></thead><tbody>';

                // Find reference column index from first date to align across dates
                let refIdx = -1;
                const firstEntry = getAnalysisFeedbackEntry(cls.id, dates[0]);
                if (firstEntry && firstEntry.dateColumns) {
                    refIdx = firstEntry.dateColumns.findIndex(c => columnContainsKeyword(c, keyword));
                }

                (cls.students || []).forEach(name => {
                    html += `<tr><td>${escapeHtml(name)}</td>`;
                    dates.forEach(d => {
                        const entry = getAnalysisFeedbackEntry(cls.id, d);
                        let val = '', bg = '', displayVal = '';
                        if (entry && entry.dateColumns) {
                            let idx = refIdx;
                            if (idx === -1 || idx >= entry.dateColumns.length || !columnContainsKeyword(entry.dateColumns[idx], keyword)) {
                                idx = entry.dateColumns.findIndex(c => columnContainsKeyword(c, keyword));
                            }
                            if (idx !== -1) {
                                const rec = entry.records ? entry.records.find(r => r.name === name) : null;
                                if (rec) {
                                    val = rec.values ? (rec.values[idx] || '') : '';
                                    bg = rec.colors ? (rec.colors[idx] || '') : '';
                                    const maxScore = extractMaxScore(entry.dateColumns[idx]);
                                    displayVal = val;
                                    if (val !== '' && maxScore > 0 && /^\d+(\.\d+)?$/.test(String(val).trim())) displayVal = String(val).trim() + '/' + maxScore;
                                    const autoBg = getAutoBackground(val, maxScore);
                                    if (autoBg) bg = autoBg;
                                }
                            }
                        }
                        html += `<td style="background:${bg}">${escapeHtml(displayVal)}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</tbody></table></div>';
            });
            return html;
        }

        window.refreshAnalysisView = function() {
            const checks = document.querySelectorAll('#analysisColumnChecks input:checked');
            analysisSelCols = Array.from(checks).map(cb => cb.value);
            const dates = getAnalysisDateList(analysisClassId);
            const t = allTeachers[analysisTeacherId];
            const cls = t ? (Array.isArray(t.classes) ? t.classes : []).find(c => c.id === analysisClassId) : null;
            const allCols = new Set();
            dates.forEach(d => { const entry = getAnalysisFeedbackEntry(analysisClassId, d); if (entry && entry.dateColumns) entry.dateColumns.forEach(c => allCols.add(stripMaxScore(c))); });
            const columns = Array.from(allCols).sort(naturalSort);
            document.getElementById('analysisStatTable').innerHTML = buildAnalysisStatTable(cls, dates, columns);
            if (analysisSelStudent) refreshAnalysisChart();
        };

        window.refreshAnalysisChart = function() {
            analysisSelStudent = document.getElementById('analysisStudentSelect')?.value || '';
            if (analysisChart) { analysisChart.destroy(); analysisChart = null; }
            if (!analysisSelStudent || !analysisSelCols.length) return;

            const canvas = document.getElementById('analysisLineCanvas');
            if (!canvas) return;
            const dates = getAnalysisDateList(analysisClassId);
            if (dates.length < 2) return;

            const datasets = [];
            analysisSelCols.forEach((keyword, idx) => {
                const studentData = [], avgData = [];
                dates.forEach(dateLabel => {
                    const entry = getAnalysisFeedbackEntry(analysisClassId, dateLabel);
                    if (!entry || !entry.dateColumns) { studentData.push(null); avgData.push(null); return; }
                    const colIdx = entry.dateColumns.findIndex(c => columnContainsKeyword(c, keyword));
                    if (colIdx === -1) { studentData.push(null); avgData.push(null); return; }
                    const maxScore = extractMaxScore(entry.dateColumns[colIdx]) || 100;
                    const records = entry.records || [];
                    let stuVal = null, sum = 0, cnt = 0;
                    records.forEach(r => {
                        const v = r.values ? r.values[colIdx] : '';
                        if (v !== '' && v !== null && v !== undefined) {
                            const score = convertToNumber(v, maxScore);
                            const pct = maxScore > 0 ? Math.round((score / maxScore) * 100) : score;
                            sum += pct; cnt++;
                            if (r.name === analysisSelStudent) stuVal = pct;
                        }
                    });
                    studentData.push(stuVal);
                    avgData.push(cnt > 0 ? Math.round(sum / cnt) : null);
                });
                const color = COLORS[idx % COLORS.length];
                datasets.push(
                    { label: analysisSelStudent + ' - ' + keyword, data: studentData, borderColor: color, backgroundColor: color, borderWidth: 2, tension: 0.2, pointRadius: 3 },
                    { label: '班级均分 - ' + keyword, data: avgData, borderColor: color, borderWidth: 2, borderDash: [5,5], tension: 0.2, pointStyle: 'triangle', pointRadius: 2 }
                );
            });

            analysisChart = new Chart(canvas, {
                type: 'line',
                data: { labels: dates, datasets },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }, scales: { y: { beginAtZero: true, max: 100, title: { display: true, text: '百分制得分' } } } }
            });
        };

        function computeAwards(t, cls) {
            var students = cls.students || [];
            var columns = cls.columns || [];
            // Get all fb keys for this class
            var fb = t.feedback || {};
            var prefix = cls.id + '|';
            var allKeys = Object.keys(fb).filter(function(k) { return k.indexOf(prefix) === 0; }).sort(naturalSort);
            // Apply range filter
            var keys = allKeys;
            if (awardsRange.indexOf('recent') === 0) {
                var n = parseInt(awardsRange.replace('recent', ''));
                keys = allKeys.slice(-n);
            }
            if (!keys.length) return { totalLessons: 0, studentCount: students.length, fullAttendance: [], progressStars: [], dictationPerfect: [], quizPerfect: [], xstPerfect: [] };

            // 排除老师提前建的空白课次（没有任何学生有数据）
            keys = keys.filter(function(k) { return isLessonActive(fb[k]); });
            if (!keys.length) return { totalLessons: 0, studentCount: students.length, fullAttendance: [], progressStars: [], dictationPerfect: [], quizPerfect: [], xstPerfect: [] };

            // Find column indices by keyword
            function findColIdx(entry, keyword) {
                if (!entry || !entry.dateColumns) return -1;
                for (var i = 0; i < entry.dateColumns.length; i++) {
                    if (columnContainsKeyword(entry.dateColumns[i], keyword)) return i;
                }
                return -1;
            }

            // === Full Attendance ===
            var attendance = {};
            students.forEach(function(s) { attendance[s] = 0; });
            keys.forEach(function(k) {
                var entry = fb[k];
                if (!entry) return;
                students.forEach(function(s) {
                    if (isStudentPresent(entry, s)) attendance[s]++;
                });
            });
            var fullAttendance = [];
            students.forEach(function(s) {
                var rate = keys.length > 0 ? Math.round(attendance[s] / keys.length * 100) : 0;
                fullAttendance.push({ name: s, present: attendance[s], total: keys.length, rate: rate + '%' });
            });
            fullAttendance.sort(function(a, b) {
                var ra = parseInt(a.rate) || 0, rb = parseInt(b.rate) || 0;
                return rb - ra;
            });

            // === Progress Stars ===
            var progressList = [];
            if (keys.length >= 4) {
                var half = Math.floor(keys.length / 2);
                var firstHalf = keys.slice(0, half);
                var secondHalf = keys.slice(half);
                students.forEach(function(s) {
                    function avgScore(ks) {
                        var sum = 0, cnt = 0;
                        ks.forEach(function(k) {
                            var entry = fb[k];
                            if (!entry) return;
                            var recs = entry.records || [];
                            var rec = recs.find(function(r) { return r.name === s; });
                            if (!rec || !rec.values) return;
                            entry.dateColumns.forEach(function(col, ci) {
                                var maxS = extractMaxScore(col);
                                if (maxS > 0 && rec.values[ci] !== '' && rec.values[ci] !== null) {
                                    var score = convertToNumber(rec.values[ci], maxS);
                                    sum += Math.round(score / maxS * 100);
                                    cnt++;
                                }
                            });
                        });
                        return cnt > 0 ? Math.round(sum / cnt) : 0;
                    }
                    var firstAvg = avgScore(firstHalf);
                    var secondAvg = avgScore(secondHalf);
                    if (firstAvg > 0 && secondAvg > 0 && secondAvg > firstAvg) {
                        progressList.push({ name: s, change: secondAvg - firstAvg, firstAvg: firstAvg, secondAvg: secondAvg });
                    }
                });
            }
            progressList.sort(function(a, b) { return b.change - a.change; });
            progressList.forEach(function(p, i) { p.rank = i + 1; });

            // === Perfect Score Categories ===
            function countPerfect(keyword) {
                var results = {};
                students.forEach(function(s) { results[s] = 0; });
                keys.forEach(function(k) {
                    var entry = fb[k];
                    if (!entry || !entry.dateColumns) return;
                    var ci = findColIdx(entry, keyword);
                    if (ci === -1) return;
                    var maxS = extractMaxScore(entry.dateColumns[ci]);
                    if (maxS <= 0) return;
                    var recs = entry.records || [];
                    students.forEach(function(s) {
                        var rec = recs.find(function(r) { return r.name === s; });
                        if (!rec || !rec.values || rec.values[ci] === '' || rec.values[ci] === null) return;
                        var score = convertToNumber(rec.values[ci], maxS);
                        if (score >= maxS) results[s]++;
                    });
                });
                var list = [];
                Object.keys(results).forEach(function(name) {
                    if (results[name] > 0) list.push({ name: name, count: results[name] });
                });
                list.sort(function(a, b) { return b.count - a.count; });
                list.forEach(function(p, i) { p.rank = i + 1; });
                return list;
            }

            function countByThreshold(keyword, threshold) {
                var results = {};
                students.forEach(function(s) { results[s] = 0; });
                keys.forEach(function(k) {
                    var entry = fb[k];
                    if (!entry || !entry.dateColumns) return;
                    var ci = findColIdx(entry, keyword);
                    if (ci === -1) return;
                    var maxS = extractMaxScore(entry.dateColumns[ci]);
                    if (maxS <= 0) return; // 非配分列（如✅标记），不参与阈值比较
                    var recs = entry.records || [];
                    students.forEach(function(s) {
                        var rec = recs.find(function(r) { return r.name === s; });
                        if (!rec || !rec.values || rec.values[ci] === '' || rec.values[ci] === null) return;
                        var score = convertToNumber(rec.values[ci], maxS);
                        if (score >= threshold) results[s]++;
                    });
                });
                var list = [];
                Object.keys(results).forEach(function(name) {
                    if (results[name] > 0) list.push({ name: name, count: results[name] });
                });
                list.sort(function(a, b) { return b.count - a.count; });
                list.forEach(function(p, i) { p.rank = i + 1; });
                return list;
            }

            var dictationPerfect = countPerfect('听写');
            var quizPerfect = countPerfect('小测');
            // 小书童口语达人：A班 ≥80，B班/S班 ≥90
            var clsNameLower = cls.name.toLowerCase();
            var xstThreshold = clsNameLower.indexOf('a') >= 0 ? 80 : (clsNameLower.indexOf('b') >= 0 || clsNameLower.indexOf('s') >= 0 ? 90 : 100);
            var xstPerfect = countByThreshold('小书童', xstThreshold);

            return {
                totalLessons: keys.length,
                studentCount: students.length,
                fullAttendance: fullAttendance,
                progressStars: progressList,
                dictationPerfect: dictationPerfect,
                quizPerfect: quizPerfect,
                xstPerfect: xstPerfect
            };
        }

        window.exportAward = function(type) {
            if (!awardsResults) return;

            var list, title;
