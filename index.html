<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>班级每日反馈表 · 汇总分析</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/mammoth@1.7.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            /* 蓝白配色风格 */
            --primary: #1e293b;
            --primary-light: #1e3a5f;
            --accent: #2563eb;
            --accent-light: #93c5fd;
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #60a5fa 100%);
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -2px rgba(0,0,0,0.03);
            --radius: 16px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --btn-radius: 9999px;
            --input-radius: 9999px;
            --input-bg: #f8fafc;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --table-header-bg: #eff6ff;
            --table-header-text: #1e40af;
            --table-border: #bfdbfe;
            --table-row-even: #f8fafc;
            --nav-height: 52px;
            --transition: 0.2s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + 4px);
            -webkit-font-smoothing: antialiased;
        }
        .container { width: 100%; max-width: 1100px; padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 12px; }

        /* ===== HEADER ===== */
        .header {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 8px 12px;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: none;
            gap: 6px;
        }
        .class-selector { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
        .class-selector > span:first-child { font-size: 1rem; }
        .class-name-display {
            font-weight: 600;
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: var(--btn-radius);
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: var(--transition);
            border: 1px solid var(--table-border);
            line-height: 1.4;
        }
        .class-name-display:hover { background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%); }

        /* ===== BUTTONS ===== */
        .btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--btn-radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all var(--transition);
            box-shadow: 0 2px 8px rgba(37,99,235,0.25);
            white-space: nowrap;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,0.35); }
        .btn:active { transform: scale(0.97); }
        .btn:focus { outline: none; }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1.5px solid var(--accent);
            box-shadow: none;
        }
        .btn-outline:hover { background: #eff6ff; box-shadow: 0 2px 8px rgba(37,99,235,0.12); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-xs {
            padding: 5px 10px;
            font-size: 11px;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            color: var(--text);
            box-shadow: none;
            border-radius: var(--btn-radius);
            font-weight: 500;
        }
        .btn-xs:hover { background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); }

        /* ===== CARDS ===== */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow-md);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
            transition: box-shadow var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-lg); }
        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--primary);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }

        /* ===== BOTTOM NAV ===== */
        .nav-tabs {
            display: flex;
            gap: 4px;
            background: var(--card-bg);
            border-radius: 9999px;
            padding: 5px;
            box-shadow: var(--shadow-lg);
            border: none;
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            z-index: 20;
            justify-content: center;
        }
        .nav-tab {
            flex: 1;
            text-align: center;
            padding: 10px 6px;
            border-radius: var(--btn-radius);
            font-weight: 600;
            font-size: 13px;
            color: var(--text-light);
            cursor: pointer;
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            white-space: nowrap;
            min-width: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
            transition: all var(--transition);
        }
        .nav-tab:hover { color: var(--accent); background: #eff6ff; }
        .nav-tab.active {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 2px 8px rgba(37,99,235,0.3);
        }
        @media (max-width: 400px) { .nav-tab { font-size: 11px; padding: 10px 6px; } .nav-tabs { padding: 5px; } }
        @media (max-width: 480px) {
            .btn { padding: 7px 14px; font-size: 12px; }
            .btn-sm { padding: 5px 10px; font-size: 11px; }
            .btn-xs { padding: 4px 8px; font-size: 10px; }
            .input { padding: 7px 10px; font-size: 12px; }
            .date-select { padding: 7px 10px; font-size: 12px; }
            .date-action-btn { width: 28px; height: 28px; font-size: 12px; }
        }
        /* ===== TABLE ===== */
        .table-wrapper {
            overflow: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--table-border);
            max-height: 60vh;
            position: relative;
            background: white;
        }
        .table-wrapper::-webkit-scrollbar { height: 6px; width: 6px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 3px; }
        .table-wrapper::-webkit-scrollbar-track { background: #eff6ff; }
        table { border-collapse: collapse; font-size: 13px; background: white; width: auto; min-width: 100%; table-layout: auto; }
        th {
            background: var(--table-header-bg);
            color: var(--table-header-text);
            font-weight: 600;
            padding: 10px 12px;
            text-align: center;
            border: 1px solid var(--table-border);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 2;
            font-size: 13px;
        }
        td {
            padding: 6px 8px;
            text-align: center;
            border: 1px solid var(--table-border);
            white-space: nowrap;
            vertical-align: middle;
        }
        tbody tr:nth-child(even) { background-color: var(--table-row-even); }
        tbody tr:hover { background-color: #eff6ff; }
        th:first-child, td:first-child { position: sticky; left: 0; z-index: 3; width: 45px; min-width: 45px; padding: 6px 6px; background-color: inherit; }
        th:first-child { z-index: 5; background-color: var(--table-header-bg); }
        th:nth-child(2), td:nth-child(2) { position: sticky; left: 45px; z-index: 3; width: 80px; min-width: 80px; background-color: inherit; }
        th:nth-child(2) { z-index: 5; background-color: var(--table-header-bg); }
        .cell-input {
            border: 1.5px solid transparent;
            background: transparent;
            padding: 4px 8px;
            font-size: 13px;
            text-align: center;
            border-radius: var(--btn-radius);
            outline: none;
            min-width: 80px;
            box-sizing: border-box;
            transition: var(--transition);
        }
        .cell-input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .active-cell-highlight {
            border-color: var(--accent) !important;
            background: #fff !important;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15) !important;
        }
        .save-indicator { font-size: 11px; color: var(--success); font-weight: 600; }
        .empty-state { text-align: center; padding: 30px; color: var(--text-muted); font-size: 13px; }
        .th-input { width: 100%; border: none; background: transparent; font-weight: 600; text-align: center; color: inherit; font-size: inherit; outline: none; padding: 2px; }
        .th-input:focus { background: rgba(255,255,255,0.9); border-radius: 6px; outline: 2px solid var(--accent-light); }

        /* ===== DATE SELECTOR ===== */
        .date-selector-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .date-select {
            padding: 8px 14px;
            border-radius: var(--btn-radius);
            border: 1.5px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            background: var(--input-bg);
            color: var(--text);
            cursor: pointer;
            min-width: 120px;
            transition: var(--transition);
            outline: none;
        }
        .date-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .date-select:hover { border-color: var(--accent-light); }
        .date-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: var(--transition);
        }
        .date-action-btn:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
        .date-action-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: #fef2f2; }

        /* ===== DATE CHIPS (保留用于其他地方) ===== */
        .date-chip {
            background: var(--input-bg);
            padding: 8px 16px;
            border-radius: var(--btn-radius);
            font-weight: 600;
            font-size: 12px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
        }
        .date-chip:hover { border-color: var(--accent); background: #eff6ff; }
        .date-chip.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(37,99,235,0.25);
        }
        .date-chip .delete-date { cursor: pointer; font-weight: bold; margin-left: 4px; color: inherit; opacity: 0.7; }
        .date-chip .delete-date:hover { opacity: 1; }

        /* ===== COLLAPSIBLE ===== */
        .style-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; font-size: 12px; }
        .capsule-btn {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 16px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            transition: var(--transition);
            color: var(--text);
        }
        .capsule-btn:hover { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); box-shadow: var(--shadow); }
        .capsule-btn[aria-expanded="true"] { border-radius: var(--radius) var(--radius) 0 0; border-bottom-color: transparent; }
        .collapsible { margin-bottom: 12px; }
        .collapsible:last-child { margin-bottom: 0; }
        .collapsible-content {
            padding: 12px;
            background: var(--card-bg);
            border-radius: 0 0 var(--radius) var(--radius);
            margin-top: 0;
            border: 1.5px solid var(--border);
            border-top: none;
            display: none;
        }

        /* ===== FLOAT BUTTON & POPUP ===== */
        .float-btn {
            position: fixed;
            z-index: 9999;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(37,99,235,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            touch-action: none;
            user-select: none;
            transition: var(--transition);
        }
        .float-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(37,99,235,0.5); }
        .tool-popup {
            position: fixed;
            z-index: 9998;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            max-width: 300px;
            width: 85%;
            max-height: 70vh;
            overflow-y: auto;
            touch-action: none;
            user-select: none;
            border: 1px solid var(--border-light);
        }
        .tool-popup.open { display: flex; }
        .popup-header { display: flex; justify-content: space-between; align-items: center; cursor: move; font-weight: 600; color: var(--primary); }
        .close-popup { background: #f1f5f9; border: none; font-size: 16px; cursor: pointer; color: var(--text-light); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .close-popup:hover { background: #e5e7eb; color: var(--text); }
        .quick-tag {
            padding: 8px 16px;
            border-radius: var(--btn-radius);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }
        .quick-tag:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .color-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2.5px solid var(--border);
            transition: var(--transition);
        }
        .color-dot:hover { transform: scale(1.15); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
        .tool-edit-panel { display: none; flex-direction: column; gap: 6px; max-height: 40vh; overflow-y: auto; }
        .tool-edit-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; background: var(--input-bg); padding: 6px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border-light); }
        .tool-edit-row input[type="text"] { flex: 1; min-width: 50px; padding: 3px 6px; font-size: 11px; border: 1px solid var(--border); border-radius: var(--input-radius); outline: none; background: var(--card-bg); }
        .tool-edit-row input[type="text"]:focus { border-color: var(--accent); }
        .tool-edit-row input[type="color"] { width: 28px; height: 24px; border: 1px solid var(--border); border-radius: 4px; padding: 0; cursor: pointer; background: none; }
        .tool-edit-row .btn.btn-xs { padding: 3px 6px; font-size: 10px; }

        /* ===== CLASS LIST ===== */
        .class-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border-radius: var(--btn-radius);
            padding: 12px 16px;
            border-left: 3px solid var(--accent);
            margin-bottom: 8px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .class-card:hover {
            background: #eff6ff;
            transform: translateX(3px);
            box-shadow: var(--shadow-md);
        }
        .class-card-wrapper { transition: transform 0.25s ease; }
        .class-card-wrapper.dragging { opacity: 0.3; z-index: 999; transition: none; }
        .drag-handle {
            cursor: grab; touch-action: none; user-select: none;
            font-size: 20px; color: var(--text-muted); flex-shrink: 0;
            line-height: 1; margin-right: 4px;
        }
        .drag-handle:active { cursor: grabbing; }
        .class-card-wrapper.drag-shift-down { transform: translateY(calc(100% + 8px)); }
        .class-card-wrapper.drag-shift-up { transform: translateY(calc(-100% - 8px)); }
        .class-card-name { font-weight: 600; color: var(--primary); font-size: 14px; text-align: left; }
        .student-modal {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            margin-top: 10px;
            padding: 16px;
            border: 1px solid var(--border-light);
            display: none;
            flex-direction: column;
            gap: 12px;
            max-width: 100%;
            overflow-x: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .student-modal.open { display: flex; animation: modalFadeIn 0.2s ease-out; }
        .class-card, .class-card * { -webkit-tap-highlight-color: transparent; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 自定义对话框（替代原生prompt/confirm，兼容夸克等移动浏览器） */
        .custom-dialog-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15,23,42,0.4); display: flex; align-items: center;
            justify-content: center; z-index: 99999; animation: modalFadeIn 0.15s ease-out;
            -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
        }
        .custom-dialog {
            background: #fff; border-radius: 20px; padding: 20px 24px;
            min-width: 280px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .custom-dialog-msg { font-size: 15px; font-weight: 600; color: #1e293b; text-align: center; margin-bottom: 12px; word-break: break-all; }
        .custom-dialog-input { width: 100%; padding: 8px 12px; font-size: 15px; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; text-align: center; margin-bottom: 12px; box-sizing: border-box; }
        .custom-dialog-input:focus { border-color: #2563eb; }
        .custom-dialog-btns { display: flex; gap: 8px; justify-content: center; }
        .custom-dialog-btns button { min-width: 80px; padding: 8px 18px; border-radius: 9999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }
        .custom-dialog-btn-cancel { background: #f1f5f9; color: #64748b; }
        .custom-dialog-btn-ok { background: #2563eb; color: #fff; }
        .student-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .student-list-item:hover { box-shadow: var(--shadow-md); border-color: var(--accent-light); }

        /* ===== FORMS ===== */
        .check-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .check-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: var(--btn-radius);
            border: 1px solid transparent;
            transition: var(--transition);
        }
        .check-group label:hover { background: #eff6ff; }
        .check-group input[type="checkbox"] { accent-color: var(--accent); }
        .chart-desc { font-size: 12px; color: var(--text-light); margin-top: 6px; text-align: center; }
        .feedback-actions { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .ai-textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            resize: vertical;
            font-family: inherit;
            font-size: 13px;
            transition: var(--transition);
            outline: none;
        }
        .ai-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .input {
            padding: 8px 14px;
            border-radius: var(--btn-radius);
            border: 1.5px solid var(--border);
            font-size: 13px;
            transition: var(--transition);
            outline: none;
            background: var(--input-bg);
        }
        .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: #fff; }

        /* ===== STAT TABLE ===== */
        .stat-table {
            table-layout: fixed !important;
            width: 100% !important;
            min-width: 100% !important;
        }
        .stat-table th,
        .stat-table td {
            width: auto !important;
            min-width: auto !important;
            max-width: none !important;
        }
        .stat-table th { white-space: nowrap; }
        .stat-table td { white-space: normal; word-break: break-word; }
        .stat-table th:first-child,
        .stat-table td:first-child {
            width: auto !important;
            min-width: auto !important;
            white-space: nowrap;
            position: sticky;
            left: 0;
            background-color: inherit;
            z-index: 3;
        }
        .stat-table th:first-child {
            z-index: 5;
            background-color: var(--table-header-bg);
        }

        /* 移动端 */
        @media (max-width: 600px) {
            .stat-table {
                table-layout: auto !important;
                width: auto !important;
                min-width: 100% !important;
                font-size: 11px;
            }
            .stat-table th,
            .stat-table td {
                padding: 6px 6px;
            }
            .stat-table th { white-space: nowrap; }
            .stat-table td { white-space: normal; word-break: break-word; }
            .table-wrapper {
                -webkit-overflow-scrolling: touch;
            }
            .tool-popup { max-width: 96%; padding: 8px; }
        }

        /* ===== FULL TABLE WRAP ===== */
        #fullTable tbody td { white-space: normal; word-break: break-word; max-width: 180px; min-width: 100px; }
        #fullTable th { white-space: nowrap; min-width: 100px; }
        #fullTable th:first-child { min-width: 45px; width: 45px; padding: 6px 6px; z-index: 5; }
        #fullTable th:nth-child(2) { min-width: 80px; width: 80px; z-index: 5; }
        #fullTable td:first-child { position: sticky; left: 0; min-width: 45px; width: 45px; white-space: nowrap; z-index: 3; background-color: inherit; }
        #fullTable td:nth-child(2) { position: sticky; left: 45px; min-width: 80px; width: 80px; white-space: nowrap; z-index: 3; background-color: inherit; }

        /* ===== ANIMATIONS ===== */
        .view { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== SELECTION ===== */
        ::selection { background: #bfdbfe; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <div class="class-selector"><span>🏫</span><span class="class-name-display" id="currentClassName" onclick="switchView('classes')">未选择</span></div>
            <div style="display:flex;gap:6px;flex-shrink:0;"><button class="btn btn-xs btn-outline" onclick="exportAllData()">💾 备份</button><button class="btn btn-xs btn-outline" onclick="importAllDataPrompt()">📥 恢复</button></div>
        </div>
        <div id="view-classes" class="view"></div>
        <div id="view-feedback" class="view" style="display:none;"></div>
        <div id="view-fulltable" class="view" style="display:none;"></div>
        <div id="view-analysis" class="view" style="display:none;"></div>
    </div>
    <div class="float-btn" id="floatBtn" onmousedown="startDragFloat(event)" ontouchstart="startDragFloat(event)">⚡</div>
    <div class="tool-popup" id="toolPopup" onmousedown="startDragPopup(event)" ontouchstart="startDragPopup(event)">
        <div class="popup-header"><span>快捷工具 <button class="btn btn-xs" onclick="openToolEditor()">⚙️</button></span><button class="close-popup" onclick="closePopup()">✕</button></div>
        <div id="toolItems" style="display:flex;flex-wrap:wrap;gap:4px;"></div>
        <div class="tool-edit-panel" id="toolEditPanel"></div>
        <div><button class="btn btn-xs" id="btnSaveTools" style="display:none;" onclick="saveToolChanges()">💾 保存</button></div>
    </div>
    <div class="nav-tabs">
        <button class="nav-tab" data-view="classes" onclick="switchView('classes')">🏫 班级</button>
        <button class="nav-tab" data-view="feedback" onclick="switchView('feedback')">✏️ 反馈</button>
        <button class="nav-tab" data-view="fulltable" onclick="switchToFullTable()">📋 总表</button>
        <button class="nav-tab" data-view="analysis" onclick="switchView('analysis')">📈 分析</button>
    </div>

    <script>
    (function() {
        // ========== 数据库封装 ==========
        const DB_NAME = 'FeedbackAppDB', DB_VERSION = 1, STORE_NAME = 'appData';
        let db, useIndexedDB = true;

        async function openDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains(STORE_NAME)) e.target.result.createObjectStore(STORE_NAME); };
                request.onsuccess = (e) => { db = e.target.result; useIndexedDB = true; resolve(db); };
                request.onerror = () => { useIndexedDB = false; resolve(null); };
            });
        }
        async function dbGet(key) {
            if (useIndexedDB && db) {
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const req = store.get(key);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = reject;
                });
            } else {
                const val = localStorage.getItem(key);
                return val ? JSON.parse(val) : undefined;
            }
        }
        async function dbSet(key, value) {
            if (useIndexedDB && db) {
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    store.put(value, key);
                    tx.oncomplete = resolve;
                    tx.onerror = reject;
                });
            } else {
                localStorage.setItem(key, JSON.stringify(value));
            }
        }

        // ========== 默认数据 ==========
        const DEFAULT_TOOLS = [
            { type:'text', label:'A+', style:'background:linear-gradient(135deg,#93c5fd,#60a5fa);color:#1e3a5f;font-weight:600;' },
            { type:'text', label:'A', style:'background:linear-gradient(135deg,#bfdbfe,#93c5fd);color:#1e40af;font-weight:600;' },
            { type:'text', label:'需完整拼读', style:'background:linear-gradient(135deg,#fecaca,#fca5a5);color:#991b1b;' },
            { type:'text', label:'已完成', style:'background:linear-gradient(135deg,#bbf7d0,#86efac);color:#166534;' },
            { type:'text', label:'未完成', style:'background:linear-gradient(135deg,#fef08a,#fde047);color:#854d0e;' },
            { type:'text', label:'清空', style:'background:#f3f4f6;color:#374151;' },
            { type:'color', color:'#f9a8d4', label:'粉' }, { type:'color', color:'#93c5fd', label:'蓝' },
            { type:'color', color:'#93c5fd', label:'蓝' }, { type:'color', color:'#86efac', label:'绿' },
            { type:'color', color:'', label:'清除' }
        ];
        function defaultClasses() { return [{ id:'c1', name:'一年级1班', students:['容俊岳','史贝晨','唐禄恒','唐瑞航','汪栎宸','胥瑾年','依依','黄梓乔','梅舒雯','张昱天','嘟嘟','龙钰栗','凌梓心','牟家锐','王沛霖','江成蹊','姚煜昕','小妤'], columns:['听写(满分12)','小测(满分10)','自学资料','笔记','语音作业','小书童(满分100)','备注'], rowHeight:36, tableColors:{ headerBg:'#eff6ff',headerText:'#1e40af',border:'#bfdbfe',rowEven:'#f8fafc' } }]; }

        let classes = defaultClasses(), feedback = {}, tools = [...DEFAULT_TOOLS], analysisSel = {};
        let currentClassId = null, currentDateLabel = 'Day1', saveTimer, activeCell = null;
        let activeStudentModal = null;
        const lineChartInstances = {}; let radarChartInstance = null;
        const undoStack = [], redoStack = [], MAX_UNDO = 30;
        let isDraggingFloat = false, isDraggingPopup = false, dragStartX, dragStartY, startLeft, startTop, popupStartLeft, popupStartTop;
        let floatBtnTop = window.innerHeight - 160, floatBtnLeft = window.innerWidth - 72;

        // ========== 工具函数 ==========
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        // 自定义对话框（替代原生prompt/confirm，避免夸克等移动浏览器拦截）
        function showConfirm(msg) { return new Promise(resolve => { const overlay = document.createElement('div'); overlay.className = 'custom-dialog-overlay'; overlay.innerHTML = `<div class="custom-dialog"><div class="custom-dialog-msg">${msg}</div><div class="custom-dialog-btns"><button class="custom-dialog-btn-cancel">取消</button><button class="custom-dialog-btn-ok">确定</button></div></div>`; const ok = () => { overlay.remove(); resolve(true); }; const cancel = () => { overlay.remove(); resolve(false); }; overlay.querySelector('.custom-dialog-btn-ok').onclick = ok; overlay.querySelector('.custom-dialog-btn-cancel').onclick = cancel; overlay.addEventListener('click', e => { if (e.target === overlay) cancel(); }); document.body.appendChild(overlay); }); }
        function showPrompt(msg, defaultVal) { return new Promise(resolve => { const overlay = document.createElement('div'); overlay.className = 'custom-dialog-overlay'; overlay.innerHTML = `<div class="custom-dialog"><div class="custom-dialog-msg">${escapeHtml(msg)}</div><input class="custom-dialog-input" value="${escapeHtml(defaultVal||'')}"><div class="custom-dialog-btns"><button class="custom-dialog-btn-cancel">取消</button><button class="custom-dialog-btn-ok">确定</button></div></div>`; const input = overlay.querySelector('.custom-dialog-input'); const ok = () => { overlay.remove(); resolve(input.value); }; const cancel = () => { overlay.remove(); resolve(null); }; overlay.querySelector('.custom-dialog-btn-ok').onclick = ok; overlay.querySelector('.custom-dialog-btn-cancel').onclick = cancel; overlay.addEventListener('click', e => { if (e.target === overlay) cancel(); }); input.addEventListener('keydown', e => { if (e.key === 'Enter') ok(); if (e.key === 'Escape') cancel(); }); document.body.appendChild(overlay); setTimeout(() => { input.focus(); input.select(); }, 80); }); }
        function naturalSort(a,b) { const re=/(\d+)/g, aP=a.split(re).filter(Boolean), bP=b.split(re).filter(Boolean); for(let i=0;i<Math.max(aP.length,bP.length);i++){const av=aP[i]||'',bv=bP[i]||'',an=parseInt(av,10),bn=parseInt(bv,10); if(!isNaN(an)&&!isNaN(bn)){if(an!==bn)return an-bn;} else if(av!==bv)return av.localeCompare(bv);} return 0; }
        function stripMaxScore(c) {
            c = c.replace(/（/g, '(').replace(/）/g, ')');
            return c.replace(/\(.*\)/, '').trim();
        }
        function columnContainsKeyword(colName, keyword) {
            const normalizedCol = colName.replace(/\s+/g, '').toLowerCase();
            const normalizedKey = keyword.replace(/\s+/g, '').toLowerCase();
            return normalizedCol.includes(normalizedKey);
        }
        function extractMaxScore(colName) {
            colName = colName.replace(/（/g, '(').replace(/）/g, ')');
            const m = colName.match(/满分\s*(\d+)/);
            return m ? parseInt(m[1]) : 0;
        }

        function getCurrentClass(){return classes.find(c=>c.id===currentClassId)||classes[0]||null;}
        function feedbackKey(cid,date){return `${cid}|${date}`;}
        function getEntry(cid,date){return feedback[feedbackKey(cid,date)];}
        function setEntry(cid,date,entry){feedback[feedbackKey(cid,date)]=entry; saveFeedbackDebounced();}
        let saveFeedbackTimeout;
        function saveFeedbackDebounced(){clearTimeout(saveFeedbackTimeout);saveFeedbackTimeout=setTimeout(()=>{dbSet('feedback',feedback);try{localStorage.setItem('_bk_feedback',JSON.stringify(feedback));}catch(e){}},300);}
        async function saveAllDataNow(){await dbSet('classes',classes);await dbSet('feedback',feedback);await dbSet('tools',tools);await dbSet('analysisSel',analysisSel);try{localStorage.setItem('_fullBackup',JSON.stringify({classes,feedback,tools,analysisSel,time:Date.now()}));}catch(e){}}

        // ========== 撤销/重做 ==========
        function pushUndo(){const cls=getCurrentClass();if(!cls)return;const key=feedbackKey(cls.id,currentDateLabel);const entry=feedback[key];if(!entry)return;undoStack.push({key,snapshot:JSON.parse(JSON.stringify(entry))});if(undoStack.length>MAX_UNDO)undoStack.shift();redoStack.length=0;}
        function undo(){if(!undoStack.length)return;const cls=getCurrentClass();if(!cls)return;const currentKey=feedbackKey(cls.id,currentDateLabel);const currentEntry=feedback[currentKey];if(!currentEntry)return;redoStack.push({key:currentKey,snapshot:JSON.parse(JSON.stringify(currentEntry))});const item=undoStack.pop();feedback[item.key]=item.snapshot;saveFeedbackDebounced();renderFeedbackTable();activeCell=null;}
        function redo(){if(!redoStack.length)return;const cls=getCurrentClass();if(!cls)return;const currentKey=feedbackKey(cls.id,currentDateLabel);const currentEntry=feedback[currentKey];if(!currentEntry)return;undoStack.push({key:currentKey,snapshot:JSON.parse(JSON.stringify(currentEntry))});const item=redoStack.pop();feedback[item.key]=item.snapshot;saveFeedbackDebounced();renderFeedbackTable();activeCell=null;}
        window.undo = undo;
        window.redo = redo;

        // ========== 反馈数据 ==========
        function initFeedbackEntry(date){
            const cls=getCurrentClass();if(!cls)return null;
            const key=feedbackKey(cls.id,date);
            if(!feedback[key]) {
                let templateColumns = [...cls.columns];
                const firstDate = getDateList()[0];
                if(firstDate && firstDate !== date) {
                    const firstEntry = getEntry(cls.id, firstDate);
                    if(firstEntry && firstEntry.dateColumns) {
                        templateColumns = [...firstEntry.dateColumns];
                    }
                }
                feedback[key] = {
                    records: cls.students.map(s => ({
                        name: s,
                        values: templateColumns.map(() => ''),
                        colors: templateColumns.map(() => '')
                    })),
                    dateColumns: templateColumns,
                    maxScores: templateColumns.map(extractMaxScore)
                };
            } else {
                const entry=feedback[key];
                if(Array.isArray(entry)) feedback[key]={records:entry,dateColumns:[...cls.columns],maxScores:cls.columns.map(extractMaxScore)};
                else {
                    if(!entry.dateColumns) entry.dateColumns=[...cls.columns];
                    if(!entry.maxScores) entry.maxScores=entry.dateColumns.map(extractMaxScore);
                    if(!entry.records) entry.records=cls.students.map(s=>({name:s,values:entry.dateColumns.map(()=>''),colors:entry.dateColumns.map(()=>'')}));
                }
            }
            saveFeedbackDebounced(); return feedback[key];
        }

        function getCurrentDayData(){
            const cls=getCurrentClass();if(!cls)return[];
            const entry=initFeedbackEntry(currentDateLabel);if(!entry)return[];
            let records=entry.records||[];
            cls.students.forEach(n=>{if(!records.find(r=>r.name===n))records.push({name:n,values:cls.columns.map(()=>''),colors:cls.columns.map(()=>'')});});
            records=records.filter(r=>cls.students.includes(r.name));
            records.forEach(r=>{while(r.values.length<entry.dateColumns.length)r.values.push('');while(r.colors.length<entry.dateColumns.length)r.colors.push('');});
            const order={};cls.students.forEach((n,i)=>order[n]=i);
            records.sort((a,b)=>(order[a.name]??99)-(order[b.name]??99));
            entry.records=records;
            return records;
        }

        function collectTableData(){
            const records=getCurrentDayData();
            document.querySelectorAll('#feedbackTableBody .cell-input').forEach(inp=>{const row=parseInt(inp.dataset.row),col=parseInt(inp.dataset.col);if(records[row])records[row].values[col]=inp.value.trim();});
            document.querySelectorAll('#feedbackTableBody td').forEach(td=>{const inp=td.querySelector('.cell-input');if(!inp)return;const row=parseInt(inp.dataset.row),col=parseInt(inp.dataset.col);if(records[row]){if(!records[row].colors)records[row].colors=new Array(records[row].values.length).fill('');records[row].colors[col]=td.style.backgroundColor||'';}});
            return records;
        }

        function saveCurrentDay(){
            const cls=getCurrentClass();if(!cls)return;
            const key=feedbackKey(cls.id,currentDateLabel);
            const data=collectTableData();
            if(!feedback[key])initFeedbackEntry(currentDateLabel);
            feedback[key].records=data;
            feedback[key].maxScores=(feedback[key].dateColumns||cls.columns).map(extractMaxScore);
            saveFeedbackDebounced();
        }

        // ========== 表格渲染 ==========
        function renderFeedbackTable(){
            const cls=getCurrentClass();if(!cls)return;
            const entry=initFeedbackEntry(currentDateLabel);if(!entry)return;
            const dateColumns=entry.dateColumns;
            const records=getCurrentDayData();
            document.getElementById('feedbackTableHead').innerHTML=`<tr><th>序号</th><th>姓名</th>${dateColumns.map(c=>`<th>${escapeHtml(c)}</th>`).join('')}</tr>`;
            const tb=document.getElementById('feedbackTableBody');
            if(!records.length){tb.innerHTML=`<tr><td colspan="${2+dateColumns.length}" class="empty-state">无学生</td></tr>`;return;}
            tb.innerHTML=records.map((r,idx)=>`<tr style="height:${cls.rowHeight}px;"><td>${idx+1}</td><td>${escapeHtml(r.name)}</td>${r.values.map((v,i)=>`<td style="background-color:${(r.colors&&r.colors[i])||''};"><input class="cell-input" data-row="${idx}" data-col="${i}" value="${escapeHtml(v)}" onfocus="selectCell(this)" oninput="autoResizeInput(this)" onkeydown="handleKeyDown(event)"></td>`).join('')}</tr>`).join('');
            tb.querySelectorAll('.cell-input').forEach(inp => {
                inp.addEventListener('input',()=>{clearTimeout(saveTimer);saveTimer=setTimeout(()=>{pushUndo();saveCurrentDay();updateSaveStatus('✅ 已自动保存');},600);});
                autoResizeInput(inp);
            });
            updateSaveStatus('✅ 已自动保存');
            if(activeCell){const nr=tb.querySelector(`.cell-input[data-row="${activeCell.dataset.row}"][data-col="${activeCell.dataset.col}"]`);if(nr){nr.classList.add('active-cell-highlight');activeCell=nr;}}
        }
        window.selectCell=function(inp){if(activeCell)activeCell.classList.remove('active-cell-highlight');activeCell=inp;activeCell.classList.add('active-cell-highlight');};
        window.handleKeyDown = function(e) {
            if (!activeCell) return;
            const row = parseInt(activeCell.dataset.row);
            const col = parseInt(activeCell.dataset.col);
            let newRow = row, newCol = col;
            if (e.key === 'ArrowUp') newRow = Math.max(0, row - 1);
            else if (e.key === 'ArrowDown') newRow = Math.min(document.querySelectorAll('#feedbackTableBody tr').length - 1, row + 1);
            else if (e.key === 'ArrowLeft') newCol = Math.max(0, col - 1);
            else if (e.key === 'ArrowRight') newCol = col + 1;
            else return;
            if (newRow !== row || newCol !== col) {
                e.preventDefault();
                const target = document.querySelector(`.cell-input[data-row="${newRow}"][data-col="${newCol}"]`);
                if (target) { target.focus(); activeCell = target; target.classList.add('active-cell-highlight'); }
            }
        };
        function updateSaveStatus(t){document.getElementById('saveStatus').textContent=t;}
        function autoResizeInput(inp){if(!inp)return;const span=document.createElement('span');span.style.visibility='hidden';span.style.position='absolute';span.style.fontSize=getComputedStyle(inp).fontSize;span.style.fontWeight=getComputedStyle(inp).fontWeight;span.textContent=inp.value||' ';document.body.appendChild(span);const w=Math.min(Math.max(span.offsetWidth+16,80),400);document.body.removeChild(span);inp.style.width=w+'px';}window.autoResizeInput=autoResizeInput;

        function renderFullTable(){
            const cls=getCurrentClass();if(!cls)return;
            const entry=initFeedbackEntry(currentDateLabel);if(!entry)return;
            const records=getCurrentDayData();
            document.getElementById('fullTableTitleInput').value=`${currentDateLabel} 学情反馈`;
            document.getElementById('fullTableHead').innerHTML=`<tr><th>序号</th><th>姓名</th>${entry.dateColumns.map(c=>`<th>${escapeHtml(c)}</th>`).join('')}</tr>`;
            const tb=document.getElementById('fullTableBody');
            if(!records.length)tb.innerHTML=`<tr><td colspan="${2+entry.dateColumns.length}" class="empty-state">无数据</td></tr>`;
            else tb.innerHTML=records.map((r,idx)=>`<tr style="height:${cls.rowHeight}px;"><td>${idx+1}</td><td>${escapeHtml(r.name)}</td>${r.values.map((v,i)=>`<td style="background-color:${(r.colors&&r.colors[i])||''};">${escapeHtml(v)}</td>`).join('')}</tr>`).join('');
        }

        function getDateList(){const prefix=currentClassId+'|';return Object.keys(feedback).filter(k=>k.startsWith(prefix)).map(k=>k.split('|')[1]).sort(naturalSort);}
        function renderDateSelector(){
            const dates=getDateList();
            const container = document.getElementById('dateSelector');
            if (dates.length === 0) {
                container.innerHTML = `<span style="color:var(--text-muted);font-size:13px;">暂无课次，请在上方新建</span>`;
                return;
            }
            container.innerHTML = `
                <span style="font-size:13px;color:var(--text-light);">当前课次：</span>
                <select class="date-select" id="dateSelectDropdown" onchange="selectDate(this.value)">
                    ${dates.map(d => `<option value="${escapeHtml(d)}" ${d === currentDateLabel ? 'selected' : ''}>${escapeHtml(d)}</option>`).join('')}
                </select>
                <button class="date-action-btn" onclick="renameCurrentDate()" title="重命名">✏️</button>
                <button class="date-action-btn danger" onclick="deleteCurrentDate()" title="删除当前课次">🗑️</button>
            `;
        }
        window.selectDate=function(d){pushUndo();saveCurrentDay();currentDateLabel=d;renderDateSelector();renderFeedbackTable();renderColumnEditor();activeCell=null;};
        window.deleteDate=async function(d){if(!await showConfirm(`删除日期"${d}"？`))return;delete feedback[feedbackKey(currentClassId,d)];saveFeedbackDebounced();const dates=getDateList();currentDateLabel=dates.length?dates.includes(currentDateLabel)?currentDateLabel:dates[0]:'Day1';if(!dates.length)initFeedbackEntry('Day1');renderDateSelector();renderFeedbackTable();renderColumnEditor();};
        window.deleteCurrentDate=()=>window.deleteDate(currentDateLabel);
        window.renameCurrentDate=async function(){const old=currentDateLabel;const n=await showPrompt('新标签',old);if(!n||!n.trim()||n.trim()===old)return;const t=n.trim();const ok=feedbackKey(currentClassId,old),nk=feedbackKey(currentClassId,t);if(feedback[nk]&&!await showConfirm('覆盖？'))return;feedback[nk]=feedback[ok];delete feedback[ok];saveFeedbackDebounced();currentDateLabel=t;renderDateSelector();renderFeedbackTable();};
        window.goToDate=function(){const v=document.getElementById('dateLabelInput').value.trim();if(!v)return alert('请输入课次名称');if(getDateList().includes(v))return alert('该课次已存在，请直接从下拉框选择');if(currentDateLabel&&getEntry(currentClassId,currentDateLabel)){pushUndo();saveCurrentDay();}currentDateLabel=v;initFeedbackEntry(currentDateLabel);document.getElementById('dateLabelInput').value='';renderDateSelector();renderFeedbackTable();renderColumnEditor();activeCell=null;};

        function renderColumnEditor(){
            const cls=getCurrentClass();if(!cls)return;
            const entry=initFeedbackEntry(currentDateLabel);
            document.getElementById('columnEditor').innerHTML=entry.dateColumns.map((c,i)=>`<div style="display:flex;align-items:center;gap:3px;background:#eff6ff;border-radius:12px;padding:4px 8px;border:1px solid #bfdbfe;"><input class="th-input" style="min-width:80px;" value="${escapeHtml(c)}" onchange="updateColumnName(${i},this.value)"><button class="btn btn-xs" style="color:var(--danger);" onclick="deleteColumn(${i})">×</button></div>`).join('')+'<button class="btn btn-xs" onclick="addColumn()">+ 添加列</button>';
        }

            document.querySelectorAll('.drag-handle').forEach(el => {
                el.addEventListener('mousedown', startClassDrag);

            });
        }
        let classDragData = null;
        let dragSuppressClick = false;

        function startClassDrag(e){
            // touch-action:none CSS already handles scroll prevention; only preventDefault for mouse to avoid text selection
            if (e.type === 'mousedown') e.preventDefault();
            e.stopPropagation();
            const w = e.currentTarget.closest('.class-card-wrapper');
            if(!w)return;
            const rects = Array.from(document.querySelectorAll('.class-card-wrapper')).map(el => ({ el, idx: parseInt(el.dataset.index), h: el.offsetHeight }));
            classDragData = {
                el: w, idx: parseInt(w.dataset.index), rects,
                startY: e.clientY !== undefined ? e.clientY : e.touches[0].clientY,
                currentTargetIdx: parseInt(w.dataset.index), moved: false
            };
            w.classList.add('dragging');
            document.addEventListener('mousemove', onClassDragMove);
            document.addEventListener('mouseup', onClassDragEnd);
            document.addEventListener('touchmove', onClassDragMove, { passive: false });
            document.addEventListener('touchend', onClassDragEnd);
        }

	        function onClassDragMove(e){
            if(!classDragData)return;
            e.preventDefault();
            const cy = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
            const dy = Math.abs(cy - classDragData.startY);
            if(!classDragData.moved && dy < 5)return;
            classDragData.moved = true;
            // 计算手指应该插入的位置（排除拖拽中的卡片，用中点判断）
            const allWrappers = document.querySelectorAll('.class-card-wrapper');
            let targetIdx = allWrappers.length - 1;
            for(let i = 0; i < allWrappers.length; i++) {
                if(allWrappers[i] === classDragData.el) continue;
                const r = allWrappers[i].getBoundingClientRect();
                if(cy < r.top + r.height / 2) { targetIdx = i; break; }
            }
            if(targetIdx !== classDragData.currentTargetIdx){
                classDragData.currentTargetIdx = targetIdx;
                // 让其他卡片让位
                const srcH = classDragData.rects[classDragData.idx].h + 8;
                allWrappers.forEach((el, i) => {
                    if(i === classDragData.idx)return;
                    let shiftY = 0;
                    if(classDragData.idx < targetIdx && i > classDragData.idx && i <= targetIdx) shiftY = -srcH;
                    if(classDragData.idx > targetIdx && i < classDragData.idx && i >= targetIdx) shiftY = srcH;
                    el.style.transform = shiftY ? `translateY(${shiftY}px)` : '';
                });
            }
            // 拖拽中的卡片跟随手指
            const offsetY = cy - classDragData.startY;
            classDragData.el.style.transform = `translateY(${offsetY}px)`;
            classDragData.el.style.zIndex = '999';
        }

        function onClassDragEnd(e){
            if(!classDragData)return;
            document.removeEventListener('mousemove', onClassDragMove);
            document.removeEventListener('mouseup', onClassDragEnd);
            document.removeEventListener('touchmove', onClassDragMove);
            document.removeEventListener('touchend', onClassDragEnd);
            classDragData.el.classList.remove('dragging');
            const toIdx = classDragData.currentTargetIdx;
            const fromIdx = classDragData.idx;
            // 清除所有transform
            document.querySelectorAll('.class-card-wrapper').forEach(w => w.style.transform = '');
            document.querySelectorAll('.class-card-wrapper').forEach(w => w.style.zIndex = '');
            if(classDragData.moved){
                dragSuppressClick = true;
                if(fromIdx !== toIdx){
                    const item = classes.splice(fromIdx, 1)[0];
                    classes.splice(toIdx, 0, item);
                    dbSet('classes', classes);
                    renderClassList();
                }
            }
            classDragData = null;
        }

            if(str==='A') return maxScore ? Math.round(90/100*maxScore) : 90;
            if(str==='A-') return maxScore ? Math.round(80/100*maxScore) : 80;
            if(str==='✅'||str==='已完成') return maxScore || 100;
            const num = parseInt(str,10); return isNaN(num) ? 0 : num;

        window.runAIAnalysis = async function() {
            const apiKey = document.getElementById('apiKeyInput')?.value?.trim();
            if (!apiKey) return alert('请填写 DeepSeek API Key');
            const cls = getCurrentClass(); if (!cls) return;
            const studentName = document.getElementById('analysisStudentSelect').value;
            if (!studentName) return alert('请选择学生');
            const radarDate = document.getElementById('radarDateSelect')?.value;
            if (!radarDate) return alert('请选择雷达图课次');
            const entry = getEntry(cls.id, radarDate); if (!entry) return alert('该课次无数据');
            const records = (Array.isArray(entry) ? entry : entry.records) || [];
            const studentRec = records.find(r => r.name === studentName);
            if (!studentRec) return alert('未找到该学生数据');
            const radarCols = Array.from(document.querySelectorAll('#radarColumnCheckGroup input:checked')).map(cb => cb.value);
            if (!radarCols.length) return alert('请勾选至少一个题型');

            let scoreDesc = `学生 ${studentName} 在 ${radarDate} 的考试中，各题型得分如下：\n`;
            radarCols.forEach(keyword => {
                const { idx, maxScore } = findColumnIndexAndMax(entry, keyword);
                const val = idx !== -1 ? (studentRec.values[idx] || '') : '';
                scoreDesc += `- ${keyword}：得分${val}，满分${maxScore || '未知'}\n`;
            });

            const manualDesc = document.getElementById('examDescTextarea')?.value?.trim() || '';
            let fileContent = '';
            const fileInput = document.getElementById('examFileInput');
            if (fileInput && fileInput.files.length > 0) fileContent = await readFileContent(fileInput.files[0]);

            let fullDesc = scoreDesc;
            if (manualDesc) fullDesc += `\n【老师补充的试卷描述】\n${manualDesc}`;
            if (fileContent) fullDesc += `\n【上传的试卷内容】\n${fileContent}`;

            const systemPrompt = `你是一位有10年教学经验的英语老师，特别擅长根据学生的试卷表现，写出既专业又充满鼓励的个性化评语，语气像手写给学生的谈心笔记。请严格遵循以下格式：1. 逐题型点评学生表现，指出具体好在哪里、不足在哪里，语言亲切；2. 归纳学生最需要加强的两个知识点或能力点；3. 给出接下来一段时间具体可操作的学习建议。不要使用Markdown符号，直接输出纯文本。`;
            const userPrompt = fullDesc + '\n请根据以上信息，对学生进行全面分析。';

            document.getElementById('aiResult').innerHTML = '分析中，请稍候...';
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userPrompt }], temperature: 0.7, max_tokens: 1000 })
                });
                const data = await response.json();
                let resultText = data.choices?.[0]?.message?.content || 'API 返回异常';
                resultText = resultText.replace(/[#*_`>]/g, '');
                document.getElementById('aiResult').innerHTML = resultText.replace(/\n/g, '<br>');
            } catch (err) { document.getElementById('aiResult').innerHTML = '请求失败：' + err.message; }
        };

        async function readFileContent(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                    reader.onload = e => resolve(e.target.result); reader.readAsText(file);
                } else if (file.name.endsWith('.docx')) {
                    reader.onload = e => mammoth.extractRawText({ arrayBuffer: e.target.result }).then(r => resolve(r.value)).catch(() => resolve('无法解析 docx 文件'));
                    reader.readAsArrayBuffer(file);
                } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
                    reader.onload = e => {
                        const pdfjsLib = window['pdfjs-dist/build/pdf'];
                        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                        pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise.then(async pdf => {
                            let text = ''; for (let i = 1; i <= pdf.numPages; i++) { const page = await pdf.getPage(i); const content = await page.getTextContent(); text += content.items.map(item => item.str).join(' ') + '\n'; }
                            resolve(text);
                        }).catch(() => resolve('无法解析 PDF 文件'));
                    };
                    reader.readAsArrayBuffer(file);
                } else resolve('不支持的文件类型');
            });
        }

        // ========== PDF 导出（智能分页） ==========

            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const margin = 10, imgWidth = pageWidth - margin*2;
            let currentY = margin;

            if (titleEl) {
                const titleCanvas = await html2canvas(titleEl, { scale: 2, backgroundColor: '#ffffff' });
                const titleImg = titleCanvas.toDataURL('image/png');
                const titleHeight = (titleCanvas.height * imgWidth) / titleCanvas.width;
                if (currentY + titleHeight > pageHeight - margin) { pdf.addPage(); currentY = margin; }
                pdf.addImage(titleImg, 'PNG', margin, currentY, imgWidth, titleHeight);
                currentY += titleHeight + 4;
            }

            const lineCards = document.querySelectorAll('#lineChartsContainer > .card');
            for (const card of lineCards) {
                const canvas = await html2canvas(card, { scale: 2, backgroundColor: '#ffffff' });
                const imgData = canvas.toDataURL('image/png');

                if (currentY + imgHeight > pageHeight - margin) { pdf.addPage(); currentY = margin; }
                pdf.addImage(imgData, 'PNG', margin, currentY, imgWidth, imgHeight);
                currentY += imgHeight + 4;
            }

            const radarSection = document.getElementById('radarSection');
            if (radarSection) {
                const canvas = await html2canvas(radarSection, { scale: 2, backgroundColor: '#ffffff' });
                const imgData = canvas.toDataURL('image/png');
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                if (currentY + imgHeight > pageHeight - margin) { pdf.addPage(); currentY = margin; }
                pdf.addImage(imgData, 'PNG', margin, currentY, imgWidth, imgHeight);
                currentY += imgHeight + 4;
            }

            const aiEl = document.getElementById('aiResult');

                const canvas = await html2canvas(aiEl, { scale: 2, backgroundColor: '#ffffff' });
                const imgData = canvas.toDataURL('image/png');
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                if (currentY + imgHeight > pageHeight - margin) { pdf.addPage(); currentY = margin; }
                pdf.addImage(imgData, 'PNG', margin, currentY, imgWidth, imgHeight);
            }

            pdf.save(fileName);
        };

        window.startDragFloat = function(e) {
            if (e.target.matches('button, span, input, textarea, select')) return;
            isDraggingFloat = true; const btn = document.getElementById('floatBtn');
            dragStartX = e.touches ? e.touches[0].clientX : e.clientX;
            dragStartY = e.touches ? e.touches[0].clientY : e.clientY;
            startLeft = parseInt(btn.style.left) || floatBtnLeft;
            startTop = parseInt(btn.style.top) || floatBtnTop;
            btn.style.transition = 'none';
            e.preventDefault();
        };
        window.startDragPopup = function(e) {
            if (e.target.matches('button, span, input, textarea, select')) return;
            isDraggingPopup = true; const popup = document.getElementById('toolPopup');
            dragStartX = e.touches ? e.touches[0].clientX : e.clientX;
            dragStartY = e.touches ? e.touches[0].clientY : e.clientY;
            popupStartLeft = parseInt(popup.style.left) || popup.getBoundingClientRect().left;
            popupStartTop = parseInt(popup.style.top) || popup.getBoundingClientRect().top;
            popup.style.transition = 'none';
            e.preventDefault();
        };
        window.addEventListener('mousemove', function(e) {
            if (isDraggingFloat) { const btn = document.getElementById('floatBtn'); btn.style.left = (startLeft + e.clientX - dragStartX) + 'px'; btn.style.top = (startTop + e.clientY - dragStartY) + 'px'; }
            if (isDraggingPopup) { const popup = document.getElementById('toolPopup'); popup.style.left = (popupStartLeft + e.clientX - dragStartX) + 'px'; popup.style.top = (popupStartTop + e.clientY - dragStartY) + 'px'; }
        });
        window.addEventListener('touchmove', function(e) {
            if (isDraggingFloat) { const btn = document.getElementById('floatBtn'); btn.style.left = (startLeft + e.touches[0].clientX - dragStartX) + 'px'; btn.style.top = (startTop + e.touches[0].clientY - dragStartY) + 'px'; }
            if (isDraggingPopup) { const popup = document.getElementById('toolPopup'); popup.style.left = (popupStartLeft + e.touches[0].clientX - dragStartX) + 'px'; popup.style.top = (popupStartTop + e.touches[0].clientY - dragStartY) + 'px'; }
        }, { passive: false });
        window.addEventListener('mouseup', (e) => {
            if (isDraggingFloat) {
                const dx = Math.abs(e.clientX - dragStartX); const dy = Math.abs(e.clientY - dragStartY);
                if (dx < 5 && dy < 5) togglePopup();
                floatBtnLeft = parseInt(document.getElementById('floatBtn').style.left) || floatBtnLeft;
                floatBtnTop = parseInt(document.getElementById('floatBtn').style.top) || floatBtnTop;
            }
            isDraggingFloat = false; isDraggingPopup = false;
        });
        window.addEventListener('touchend', (e) => {
            if (isDraggingFloat) {
                const touch = e.changedTouches[0]; const dx = Math.abs(touch.clientX - dragStartX); const dy = Math.abs(touch.clientY - dragStartY);
                if (dx < 5 && dy < 5) togglePopup();
                floatBtnLeft = parseInt(document.getElementById('floatBtn').style.left) || floatBtnLeft;
                floatBtnTop = parseInt(document.getElementById('floatBtn').style.top) || floatBtnTop;
