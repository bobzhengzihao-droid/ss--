            document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
            const map={'classes':'view-classes','feedback':'view-feedback','fulltable':'view-fulltable','analysis':'view-analysis'};
            if(map[viewName])document.getElementById(map[viewName]).style.display='block';
            const nav=document.querySelector(`.nav-tab[data-view="${viewName}"]`);if(nav)nav.classList.add('active');
            const floatBtn=document.getElementById('floatBtn');floatBtn.style.display=viewName==='feedback'?'flex':'none';
            if(viewName!=='feedback')closePopup();
            if(viewName==='classes')renderClassList();
            else if(viewName==='feedback'){renderDateSelector();renderColumnEditor();renderFeedbackTable();refreshStylePanel();applyTableColors(getCurrentClass());}
            else if(viewName==='fulltable') { 
                renderFullTable(); 
                switchStatType();
            }
            else if(viewName==='analysis')renderAnalysisOptions();
            updateCurrentClassDisplay(); document.querySelectorAll('.student-modal').forEach(m=>m.classList.remove('open'));activeStudentModal=null;
        }
        window.switchView=switchView;window.switchToFullTable=()=>switchView('fulltable');
        function updateCurrentClassDisplay(){const cls=getCurrentClass();document.getElementById('currentClassName').textContent=cls?cls.name:'未选择';}
        function refreshStylePanel(){const cls=getCurrentClass();if(!cls)return;document.getElementById('styleHeaderBg').value=cls.tableColors.headerBg;document.getElementById('styleHeaderText').value=cls.tableColors.headerText;document.getElementById('styleBorder').value=cls.tableColors.border;document.getElementById('styleRowEven').value=cls.tableColors.rowEven;document.getElementById('styleRowHeight').value=cls.rowHeight;}
        window.applyStyleColor=function(key,value){const cls=getCurrentClass();if(!cls)return;cls.tableColors[key]=value;updateClass(cls);applyTableColors(cls);};
        window.applyRowHeight=function(){const cls=getCurrentClass();if(!cls)return;const val=parseInt(document.getElementById('styleRowHeight').value);if(isNaN(val)||val<20)return;cls.rowHeight=val;updateClass(cls);renderFeedbackTable();renderFullTable();};
        function applyTableColors(cls){if(!cls||!cls.tableColors)return;const r=document.documentElement.style;r.setProperty('--table-header-bg',cls.tableColors.headerBg);r.setProperty('--table-header-text',cls.tableColors.headerText);r.setProperty('--table-border',cls.tableColors.border);r.setProperty('--table-row-even',cls.tableColors.rowEven);}
        function updateClass(cls){classes=classes.map(c=>c.id===cls.id?cls:c);dbSet('classes',classes);}

        // ========== 统计表功能 (全部挂载到window) ==========
        window.switchStatType = function() {
            const type = document.getElementById('statType').value;
            const targetSelect = document.getElementById('statTarget');
            const cls = getCurrentClass();
            if (!cls) return;

            let optionsHTML = '';
            if (type === 'byColumn') {
                // 优先使用第一次课的实际列作为板块选项
                let columns = cls.columns;
                const dates = getDateList();
                if (dates.length) {
                    const firstEntry = getEntry(cls.id, dates[0]);
                    if (firstEntry && firstEntry.dateColumns && firstEntry.dateColumns.length) {
                        columns = firstEntry.dateColumns;
                    }
                }
                optionsHTML = columns.map(col => {
                    const pure = stripMaxScore(col);
                    return `<option value="${escapeHtml(pure)}">${escapeHtml(pure)}</option>`;
                }).join('');
            } else {
                optionsHTML = cls.students.map(s =>
                    `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`
                ).join('');
            }

            if (!optionsHTML) {
                targetSelect.innerHTML = '';
                document.getElementById('statTableWrapper').innerHTML = '<div class="empty-state">暂无数据</div>';
                return;
            }

            targetSelect.innerHTML = optionsHTML;
            targetSelect.selectedIndex = 0;
            window.renderStatTable();
        };

        window.renderStatTable = function() {
            const type = document.getElementById('statType').value;
            const target = document.getElementById('statTarget').value;
            if (!target) return;
            if (type === 'byColumn') {
                renderStatTableByColumn(target);
            } else {
                renderStatTableByStudent(target);
            }
        };

        function getAutoBackground(val, maxScore) {
            if (val === '' || val === null) return '';
            const str = String(val).trim();
            if (str === '未完成' || str === '❌' || str === '×') return '#f8d7da';
            if (maxScore > 0) {
                const score = convertToNumber(val, maxScore);
                if (score !== null && score !== undefined) {
                    if (score === 0) return '#f8d7da';
                    if (score === maxScore) return '#d4edda';
                }
            }
            return null;
        }

        function renderStatTableByColumn(colKeyword) {
            const cls = getCurrentClass();
            if (!cls) return;
            const dates = getDateList();
            const students = cls.students;

            // 以第一次课的列索引为基准，保证所有课次统一对齐
            let refIdx = -1;
            const firstDate = dates[0];
            if (firstDate) {
                const firstEntry = getEntry(cls.id, firstDate);
                if (firstEntry) {
                    refIdx = firstEntry.dateColumns.findIndex(c => columnContainsKeyword(c, colKeyword));
                }
            }

            let html = `<h3 style="text-align:center;margin-bottom:8px;">${escapeHtml(colKeyword)} 学情总结</h3>`;
            html += '<table class="stat-table"><thead>';
            html += '<tr><th>学生</th>';
            dates.forEach(d => html += `<th>${escapeHtml(d)}</th>`);
            html += '</tr></thead><tbody>';

            students.forEach(stu => {
                html += `<tr><td>${escapeHtml(stu)}</td>`;
                dates.forEach(d => {
                    const entry = getEntry(cls.id, d);
                    let val = '', bg = '', displayVal = '';
                    if (entry) {
                        // 优先使用第一次课的索引作为统一基准，回退到关键词匹配
                        let idx = refIdx;
                        if (idx === -1 || idx >= entry.dateColumns.length || !columnContainsKeyword(entry.dateColumns[idx], colKeyword)) {
                            idx = entry.dateColumns.findIndex(c => columnContainsKeyword(c, colKeyword));
                        }
                        if (idx !== -1) {
                            const rec = entry.records.find(r => r.name === stu);
                            if (rec) {
                                val = rec.values[idx] || '';
                                bg = (rec.colors && rec.colors[idx]) ? rec.colors[idx] : '';
                            }
                            const maxScore = extractMaxScore(entry.dateColumns[idx]);
                            displayVal = val;
                            if (val !== '' && maxScore > 0 && /^\d+(\.\d+)?$/.test(String(val).trim())) {
                                displayVal = String(val).trim() + '/' + maxScore;
                            }
                            const autoBg = getAutoBackground(val, maxScore);
                            if (autoBg) bg = autoBg;
                        }
                    }
                    html += `<td style="background:${bg}">${escapeHtml(displayVal)}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('statTableWrapper').innerHTML = html;
        }

        function renderStatTableByStudent(studentName) {
            const cls = getCurrentClass();
            if (!cls) return;
            const dates = getDateList();

            let columns = [];
            const firstDate = dates[0];
            if (firstDate) {
                const firstEntry = getEntry(cls.id, firstDate);
                if (firstEntry) {
                    columns = [...firstEntry.dateColumns];
                }
            }
            if (!columns.length) {
                const allCols = new Set();
                dates.forEach(d => {
                    const entry = getEntry(cls.id, d);
                    if (entry) entry.dateColumns.forEach(c => allCols.add(c));
                });
                columns = Array.from(allCols).sort(naturalSort);
            }

            let html = `<h3 style="text-align:center;margin-bottom:8px;">${escapeHtml(studentName)} 学情统计</h3>`;
            html += '<table class="stat-table"><thead><tr><th>日期</th>';
            columns.forEach(col => html += `<th>${escapeHtml(stripMaxScore(col))}</th>`);
            html += '</tr></thead><tbody>';

            dates.forEach(d => {
                html += `<tr><td>${escapeHtml(d)}</td>`;
                const entry = getEntry(cls.id, d);
                const rec = entry ? entry.records.find(r => r.name === studentName) : null;
                columns.forEach(colRaw => {
                    let val = '', bg = '';
                    if (entry && rec) {
                        const keyword = stripMaxScore(colRaw);
                        const matchedCol = entry.dateColumns.find(c => columnContainsKeyword(c, keyword));
                        if (matchedCol) {
                            const idx = entry.dateColumns.indexOf(matchedCol);
                            if (idx !== -1) {
                                val = rec.values[idx] || '';
                                bg = (rec.colors && rec.colors[idx]) ? rec.colors[idx] : '';
                            }
                            const maxScore = extractMaxScore(matchedCol);
                            let displayVal = val;
                            if (val !== '' && maxScore > 0 && /^\d+(\.\d+)?$/.test(String(val).trim())) {
                                displayVal = String(val).trim() + '/' + maxScore;
                            }
                            const autoBg = getAutoBackground(val, maxScore);
                            if (autoBg) bg = autoBg;
                            html += `<td style="background:${bg}">${escapeHtml(displayVal)}</td>`;
                            return;
                        }
                    }
                    html += `<td></td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('statTableWrapper').innerHTML = html;
        }

        window.exportStatExcel = function() {
            const target = document.getElementById('statTarget').value;
            if (!target) return alert('请先选择统计目标');
            const title = '统计表_' + target;
            const wrapper = document.getElementById('statTableWrapper');
            const table = wrapper.querySelector('.stat-table');
            if (!table) return;
            const clone = table.cloneNode(true);
            clone.querySelectorAll('th,td').forEach(function(c){c.style.position='';c.style.left='';c.style.zIndex='';});
            var styleEl=document.createElement('style');
            styleEl.textContent='@page { size: landscape; margin: 10mm; } body{font-family:Arial;text-align:center}h3{text-align:center;margin:16px 0}table{border-collapse:collapse;margin:0 auto;table-layout:auto;width:auto}th{padding:10px 12px;border:1px solid #bfdbfe;text-align:center;background:#eff6ff;color:#1e40af;white-space:normal;word-break:break-word;mso-number-format:\\@;}td{padding:8px 10px;border:1px solid #bfdbfe;text-align:center;white-space:normal;word-break:break-word;mso-number-format:\\@;}tr:nth-child(even) td{background:#f8fafc}';
            var finalHtml='<html><head><meta charset="utf-8"><title>'+escapeHtml(title)+'</title>'+styleEl.outerHTML+'</head><body>'+clone.outerHTML+'</body></html>';
            const blob = new Blob([finalHtml], { type: 'application/vnd.ms-excel' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = title + '.xls';
            a.click();
        };

        window.exportStatImage = function() {
            const wrapper = document.getElementById('statTableWrapper');
            const table = wrapper.querySelector('.stat-table');
            const origStyle = wrapper.getAttribute('style') || '';
            const origTblStyle = table ? table.getAttribute('style') || '' : '';
            const origParentStyle = wrapper.parentNode.style.cssText;

            // 解除所有限制，让表格完全展开
            wrapper.parentNode.style.overflow = 'visible';
            wrapper.parentNode.style.maxHeight = 'none';
            wrapper.style.overflow = 'visible';
            wrapper.style.maxHeight = 'none';
            wrapper.style.width = 'auto';
            wrapper.style.maxWidth = 'none';
            wrapper.style.margin = '0';
            if (table) {
                table.style.tableLayout = 'auto';
                table.style.width = 'auto';
                table.style.minWidth = 'auto';
            }

            // 短暂延迟后测量精确尺寸
            setTimeout(() => {
                let w = wrapper.scrollWidth;
                let h = wrapper.scrollHeight;
                // 确保容器宽度贴合表格，包含边框
                wrapper.style.width = (w + 4) + 'px';
                w = wrapper.scrollWidth;
                h = wrapper.scrollHeight;

                html2canvas(wrapper, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    width: w + 4,
                    height: h + 4,
                    windowWidth: w + 4,
                    windowHeight: h + 4
                }).then(canvas => {
                    // 恢复样式
                    wrapper.setAttribute('style', origStyle);
                    if (table) table.setAttribute('style', origTblStyle);
                    wrapper.parentNode.style.cssText = origParentStyle;

                    canvas.toBlob(blob => {
                        const target = document.getElementById('statTarget').value;
                        const title = `统计表_${target || '未选择'}`;
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `${title}.png`;
                        a.click();
                    });
                });
            }, 50);
        };

        // 启动
        window.addEventListener('DOMContentLoaded', async () => {
            // 请求浏览器持久存储权限（告诉浏览器不要自动清理数据）
            if (navigator.storage && navigator.storage.persist) {
                navigator.storage.persist().then(granted => { if (granted) console.log('持久存储已启用'); });
            }
            await openDB(); let storedClasses = await dbGet('classes');
            if (!storedClasses) {
                // IndexedDB可能被浏览器更新清空了，尝试从localStorage恢复
                const backup = localStorage.getItem('_fullBackup');
                if (backup) { try { const data = JSON.parse(backup); if (data.classes && data.classes.length) { classes = data.classes; feedback = data.feedback||{}; tools = data.tools||[...DEFAULT_TOOLS]; analysisSel = data.analysisSel||{}; alert('✅ 已从本地备份自动恢复数据\n\n浏览器更新可能清除了存储，数据已自动恢复。建议点击顶部 💾备份 手动导出一份文件。'); } } catch(e) {} }
                if (!classes || !classes.length) { classes = defaultClasses(); feedback={}; tools=[...DEFAULT_TOOLS]; analysisSel={}; await saveAllDataNow(); }
            } else { classes = storedClasses; feedback = (await dbGet('feedback'))||{}; tools = (await dbGet('tools'))||[...DEFAULT_TOOLS]; analysisSel = (await dbGet('analysisSel'))||{}; }
            currentClassId = classes.length ? classes[0].id : null;
            currentDateLabel = getDateList()[0] || 'Day1';
            buildAllViews(); applyTableColors(getCurrentClass()); switchView('classes');
            const floatBtn = document.getElementById('floatBtn'); floatBtn.style.left = floatBtnLeft + 'px'; floatBtn.style.top = floatBtnTop + 'px';
            let floatSavedTop = floatBtnTop;
            document.addEventListener('focusin', e => {
                const tag = e.target.tagName;
                if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.closest('.cell-input')) {
                    if (floatBtn) { floatSavedTop = parseInt(floatBtn.style.top) || floatBtnTop; floatBtn.style.top = '10px'; floatBtn.style.bottom = 'auto'; }
                }
            });
            document.addEventListener('focusout', e => {
                const related = e.relatedTarget;
                if (!related || (related.tagName !== 'INPUT' && related.tagName !== 'TEXTAREA' && !related.closest('.cell-input'))) {
                    setTimeout(() => {
                        if (floatBtn && !document.activeElement || (document.activeElement && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA')) {
                            floatBtn.style.top = floatSavedTop + 'px'; floatBtn.style.bottom = 'auto';
                        }
                    }, 200);
                }
            });
        });
        window.addEventListener('keydown', e => {
            if ((e.ctrlKey||e.metaKey)&&e.key==='z') { e.preventDefault(); undo(); }
            if ((e.ctrlKey||e.metaKey)&&e.key==='y') { e.preventDefault(); redo(); }
        });
    })();
    </script>
