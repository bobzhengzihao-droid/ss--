<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>班级每日反馈表 · 汇总分析</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/mammoth@1.7.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            /* 蓝白配色风格 */
            --primary: #1e293b;
            --primary-light: #1e3a5f;
            --accent: #2563eb;
            --accent-light: #93c5fd;
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #60a5fa 100%);
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -2px rgba(0,0,0,0.03);
            --radius: 16px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --btn-radius: 9999px;
            --input-radius: 9999px;
            --input-bg: #f8fafc;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --table-header-bg: #eff6ff;
            --table-header-text: #1e40af;
            --table-border: #bfdbfe;
            --table-row-even: #f8fafc;
            --nav-height: 52px;
            --transition: 0.2s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + 4px);
            -webkit-font-smoothing: antialiased;
        }
        #mainApp { width: 100%; }
        .app-only { display: none; }
        body.logged-in #mainApp.app-only { display: block; }
        body.logged-in .nav-tabs.app-only { display: flex; }
        .tool-popup.app-only { display: none; }
        .tool-popup.app-only.open { display: flex; }
        .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 12px; }

        /* ===== HEADER ===== */
        .header {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 8px 12px;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: none;
            gap: 8px;
        }
        .class-selector { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
        .class-selector > span:first-child { font-size: 1rem; }
        .class-name-display {
            font-weight: 600;
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: var(--btn-radius);
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: var(--transition);
            border: 1px solid var(--table-border);
            line-height: 1.4;
            -webkit-tap-highlight-color: transparent;
        }
        .class-name-display:hover { background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%); }
        .class-name-display:active { transform: scale(0.95); opacity: 0.8; }

        /* ===== BUTTONS ===== */
        .btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--btn-radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all var(--transition);
            box-shadow: 0 2px 8px rgba(37,99,235,0.25);
            white-space: nowrap;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,0.35); }
        .btn:active { transform: scale(0.97); }
        .btn:focus { outline: none; }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1.5px solid var(--accent);
            box-shadow: none;
        }
        .btn-outline:hover { background: #eff6ff; box-shadow: 0 2px 8px rgba(37,99,235,0.12); }
        .btn-outline:active { background: #dbeafe; transform: scale(0.97); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-xs {
            padding: 5px 10px;
            font-size: 11px;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            color: var(--text);
            box-shadow: none;
            border-radius: var(--btn-radius);
            font-weight: 500;
        }
        .btn-xs:hover { background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); }
        .btn-xs:active { opacity: 0.7; transform: scale(0.96); }

        /* ===== CARDS ===== */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow-md);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
            transition: box-shadow var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-lg); }
        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--primary);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }

        /* ===== BOTTOM NAV ===== */
        .nav-tabs {
            display: flex;
            gap: 4px;
            background: var(--card-bg);
            border-radius: 9999px;
            padding: 5px;
            box-shadow: var(--shadow-lg);
            border: none;
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            z-index: 20;
            justify-content: center;
        }
        .nav-tab {
            flex: 1;
            text-align: center;
            padding: 10px 6px;
            border-radius: var(--btn-radius);
            font-weight: 600;
            font-size: 13px;
            color: var(--text-light);
            cursor: pointer;
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            white-space: nowrap;
            min-width: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
            transition: all var(--transition);
        }
        .nav-tab:hover { color: var(--accent); background: #eff6ff; }
        .nav-tab:active { transform: scale(0.95); opacity: 0.8; }
        .nav-tab.active {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 2px 8px rgba(37,99,235,0.3);
        }
        @media (max-width: 400px) { .nav-tab { font-size: 11px; padding: 10px 6px; } .nav-tabs { padding: 5px; } }
        @media (max-width: 480px) {
            .btn { padding: 7px 14px; font-size: 12px; }
            .btn-sm { padding: 5px 10px; font-size: 11px; }
            .btn-xs { padding: 4px 8px; font-size: 10px; }
            .input { padding: 7px 10px; font-size: 12px; }
            .date-select { padding: 7px 10px; font-size: 12px; }
            .date-action-btn { width: 28px; height: 28px; font-size: 12px; }
            .class-name-display { max-width: 130px; font-size: 11px; padding: 4px 8px; }
        }
        /* ===== TABLE ===== */
        .table-wrapper {
            overflow: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--table-border);
            max-height: 60vh;
            position: relative;
            background: white;
        }
        .table-wrapper::-webkit-scrollbar { height: 6px; width: 6px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 3px; }
        .table-wrapper::-webkit-scrollbar-track { background: #eff6ff; }
        table { border-collapse: collapse; font-size: 13px; background: white; width: auto; min-width: 100%; table-layout: auto; }
        th {
            background: var(--table-header-bg);
            color: var(--table-header-text);
            font-weight: 600;
            padding: 10px 12px;
            text-align: center;
            border: 1px solid var(--table-border);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 2;
            font-size: 13px;
        }
        td {
            padding: 6px 8px;
            text-align: center;
            border: 1px solid var(--table-border);
            white-space: nowrap;
            vertical-align: middle;
        }
        tbody tr:nth-child(even) { background-color: var(--table-row-even); }
        tbody tr:hover { background-color: #eff6ff; }
        th:first-child, td:first-child { position: sticky; left: 0; z-index: 3; width: 45px; min-width: 45px; padding: 6px 6px; background-color: inherit; }
        th:first-child { z-index: 5; background-color: var(--table-header-bg); }
        th:nth-child(2), td:nth-child(2) { position: sticky; left: 45px; z-index: 3; width: 80px; min-width: 80px; background-color: inherit; }
        th:nth-child(2) { z-index: 5; background-color: var(--table-header-bg); }
        .cell-input {
            border: 1.5px solid transparent;
            background: transparent;
            padding: 4px 8px;
            font-size: 13px;
            text-align: center;
            border-radius: var(--btn-radius);
            outline: none;
            min-width: 100px;
            box-sizing: border-box;
            transition: var(--transition);
        }
        .cell-input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .active-cell-highlight {
            border-color: var(--accent) !important;
            background: #fff !important;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15) !important;
        }
        .save-indicator { font-size: 11px; color: var(--success); font-weight: 600; }
        .empty-state { text-align: center; padding: 30px; color: var(--text-muted); font-size: 13px; }
        .th-input { width: 100%; border: none; background: transparent; font-weight: 600; text-align: center; color: inherit; font-size: inherit; outline: none; padding: 2px; }
        .th-input:focus { background: rgba(255,255,255,0.9); border-radius: 6px; outline: 2px solid var(--accent-light); }

        /* ===== DATE SELECTOR ===== */
        .date-selector-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .date-select {
            padding: 8px 14px;
            border-radius: var(--btn-radius);
            border: 1.5px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            background: var(--input-bg);
            color: var(--text);
            cursor: pointer;
            min-width: 120px;
            transition: var(--transition);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .date-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .date-select:hover { border-color: var(--accent-light); }
        .date-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .date-action-btn:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
        .date-action-btn:active { transform: scale(0.9); opacity: 0.7; }
        .date-action-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: #fef2f2; }

        /* ===== DATE CHIPS (保留用于其他地方) ===== */
        .date-chip {
            background: var(--input-bg);
            padding: 8px 16px;
            border-radius: var(--btn-radius);
            font-weight: 600;
            font-size: 12px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .date-chip:hover { border-color: var(--accent); background: #eff6ff; }
        .date-chip:active { transform: scale(0.95); opacity: 0.8; }
        .date-chip.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(37,99,235,0.25);
        }
        .date-chip .delete-date { cursor: pointer; font-weight: bold; margin-left: 4px; color: inherit; opacity: 0.7; }
        .date-chip .delete-date:hover { opacity: 1; }

        /* ===== COLLAPSIBLE ===== */
        .style-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; font-size: 12px; }
        .capsule-btn {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 16px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            transition: var(--transition);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }
        .capsule-btn:hover { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); box-shadow: var(--shadow); }
        .capsule-btn:active { background: #e2e8f0; transform: scale(0.99); }
        .capsule-btn[aria-expanded="true"] { border-radius: var(--radius) var(--radius) 0 0; border-bottom-color: transparent; }
        .collapsible { margin-bottom: 12px; }
        .collapsible:last-child { margin-bottom: 0; }
        .collapsible-content {
            padding: 12px;
            background: var(--card-bg);
            border-radius: 0 0 var(--radius) var(--radius);
            margin-top: 0;
            border: 1.5px solid var(--border);
            border-top: none;
            display: none;
        }

        /* ===== FLOAT BUTTON & POPUP ===== */
        .float-btn {
            position: fixed;
            z-index: 9999;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(37,99,235,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            touch-action: none;
            user-select: none;
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .float-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(37,99,235,0.5); }
        .float-btn:active { transform: scale(0.9); opacity: 0.8; }
        .tool-popup {
            position: fixed;
            z-index: 9998;
            background: var(--card-bg);
            border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 2px;
            max-width: 260px;
            width: 80%;
            max-height: 38vh;
            overflow-y: auto;
            touch-action: none;
            user-select: none;
            border: 1px solid var(--border-light);
        }
        .tool-popup.open { display: flex; }
        .popup-header { display: flex; justify-content: space-between; align-items: center; cursor: move; font-weight: 600; color: var(--primary); }
        .close-popup { background: #f1f5f9; border: none; font-size: 14px; cursor: pointer; color: var(--text-light); width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition); -webkit-tap-highlight-color: transparent; }
        .close-popup:hover { background: #e5e7eb; color: var(--text); }
        .close-popup:active { transform: scale(0.85); opacity: 0.7; }
        .quick-tag {
            padding: 5px 10px;
            border-radius: var(--btn-radius);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .quick-tag:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .quick-tag:active { transform: scale(0.92); opacity: 0.75; }
        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid var(--border);
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .color-dot:hover { transform: scale(1.15); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
        .color-dot:active { transform: scale(0.85); opacity: 0.7; }
        .tool-edit-panel { display: none; flex-direction: column; gap: 6px; max-height: 40vh; overflow-y: auto; }
        .tool-edit-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; background: var(--input-bg); padding: 6px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border-light); }
        .tool-edit-row input[type="text"] { flex: 1; min-width: 50px; padding: 3px 6px; font-size: 11px; border: 1px solid var(--border); border-radius: var(--input-radius); outline: none; background: var(--card-bg); }
        .tool-edit-row input[type="text"]:focus { border-color: var(--accent); }
        .tool-edit-row input[type="color"] { width: 28px; height: 24px; border: 1px solid var(--border); border-radius: 4px; padding: 0; cursor: pointer; background: none; }
        .tool-edit-row .btn.btn-xs { padding: 3px 6px; font-size: 10px; }
        .popup-footer {
            display: flex;
            justify-content: space-between;
            gap: 4px;
            margin-top: 2px;
            padding-top: 6px;
            border-top: 1px solid var(--border);
        }
        .popup-action-btn {
            padding: 9px 14px;
            border-radius: var(--btn-radius);
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .popup-action-btn:hover { background: #eff6ff; border-color: var(--accent-light); }
        .popup-action-btn:active { background: #dbeafe; transform: scale(0.95); opacity: 0.8; }

        /* ===== CLASS LIST ===== */
        .class-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border-radius: var(--btn-radius);
            padding: 12px 16px;
            border-left: 3px solid var(--accent);
            margin-bottom: 8px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .class-card:hover {
            background: #eff6ff;
            transform: translateX(3px);
            box-shadow: var(--shadow-md);
        }
        .class-card:active { transform: scale(0.98); opacity: 0.8; }
        .class-card-wrapper { transition: transform 0.25s ease; }
        .class-card-wrapper.dragging { opacity: 0.3; z-index: 999; transition: none; }
        .drag-handle {
            cursor: grab; touch-action: none; user-select: none;
            font-size: 20px; color: var(--text-muted); flex-shrink: 0;
            line-height: 1; margin-right: 4px;
        }
        .drag-handle:active { cursor: grabbing; }
        .class-card-wrapper.drag-shift-down { transform: translateY(calc(100% + 8px)); }
        .class-card-wrapper.drag-shift-up { transform: translateY(calc(-100% - 8px)); }
        .class-card-name { font-weight: 600; color: var(--primary); font-size: 14px; text-align: left; }
        .student-modal {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            margin-top: 10px;
            padding: 16px;
            border: 1px solid var(--border-light);
            display: none;
            flex-direction: column;
            gap: 12px;
            max-width: 100%;
            overflow-x: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .student-modal.open { display: flex; animation: modalFadeIn 0.2s ease-out; }
        .class-card, .class-card * { -webkit-tap-highlight-color: transparent; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 自定义对话框（替代原生prompt/confirm，兼容夸克等移动浏览器） */
        .custom-dialog-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15,23,42,0.4); display: flex; align-items: center;
            justify-content: center; z-index: 99999; animation: modalFadeIn 0.15s ease-out;
            -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
        }
        .custom-dialog {
            background: #fff; border-radius: 20px; padding: 20px 24px;
            min-width: 280px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .custom-dialog-msg { font-size: 15px; font-weight: 600; color: #1e293b; text-align: center; margin-bottom: 12px; word-break: break-all; }

            const { data, error } = await supabase.auth.setSession({

                refresh_token: authData.refresh_token
            });
            if (error) throw error;
            const user = data.user || (await supabase.auth.getUser()).data.user;

        async function loginDirect(name, password) {
            const savedEmail = localStorage.getItem('_fb_name_email_' + name);
            const candidates = [];
            if (savedEmail) candidates.push(savedEmail);
            candidates.push(name.includes('@') ? name : nameToEmail(name));
            const legacyEmail = legacyNameToEmail(name);
            if (!candidates.includes(legacyEmail)) candidates.push(legacyEmail);

            let lastError = null;
            for (const email of candidates) {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (!error) return { user: data.user, email };
                lastError = error;
            }
            throw lastError || new Error('姓名或密码错误');
        }

        async function registerDirect(name, password, code) {
            // 1. Check name uniqueness via teacher_profiles (public read)
            const { data: existing } = await supabase.from('teacher_profiles')
                .select('name').eq('name', name).maybeSingle();
            if (existing) throw new Error('该姓名已注册，请直接登录');

            // 2. Create user via Supabase Auth (triggers auto-confirm + profile creation)
            const email = nameToEmail(name);
            const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: { data: { name: name } }
            });
            if (signUpError) {
                if (signUpError.message && (signUpError.message.includes('already') || signUpError.message.includes('exists'))) {
                    throw new Error('该姓名已注册，请直接登录');
                }
                throw new Error(signUpError.message || '注册失败');
            }

            // 3. Save email mapping for future logins
            localStorage.setItem('_fb_name_email_' + name, email);

            return { email, name, user: signUpData.user };
        }

        window.resetTeacherPassword = async function(userId, displayName) {
            const newPwd = await showPrompt(`为 ${displayName} 设置新密码（至少4位）：`, '');
            if (newPwd === null) return;
            if (!newPwd || newPwd.length < 4) { alert('密码至少4位'); return; }

            // Try server API first
            try {
                const resp = await fetch(API_BASE + '/api/admin/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin_password: ADMIN_PASSWORD, name: displayName, new_password: newPwd })
                });
                if (resp.ok) {
                    alert('密码已重置，请将新密码告知 ' + displayName);
                    return;
                }
            } catch(e) {
                console.warn('Server API unreachable for reset, falling back to direct Supabase');
            }

            // Fallback: direct Supabase
            const sk = await getServiceKey();
            if (!sk) return;
            try {
                const adminClient = window.supabase.createClient(SUPABASE_URL, sk, {
                    auth: { autoRefreshToken: false, persistSession: false, detectSessionInUrl: false }
                });
                const { error } = await adminClient.auth.admin.updateUserById(userId, { password: newPwd });
                if (error) { alert('重置失败：' + error.message); return; }
                alert('密码已重置，请将新密码告知 ' + displayName);
            } catch(e) {
                alert('重置错误：' + e.message);
            }
        };

        // ===== 管理员导出：格式2 长表 =====
        window.exportAdminExcel = function() {
            const allData = window._adminData;
            if (!allData || !Object.keys(allData).length) { alert('请先查询数据'); return; }

            const rows = [['教师', '班级', '日期', '学生', '题型', '得分']];
            Object.values(allData).forEach(u => {
                const classes = Array.isArray(u.classes) ? u.classes : [];
                const fbKeys = Object.keys(u.feedback || {});
                const teacherName = u.name || (u.id || '').substring(0, 8);

                classes.forEach(cls => {
                    const clsPrefix = cls.id + '|';
                    fbKeys.filter(k => k.startsWith(clsPrefix)).forEach(k => {
                        const dateLabel = k.substring(clsPrefix.length);
                        const fb = u.feedback[k];
                        const records = fb && Array.isArray(fb.records) ? fb.records : [];
                        const dateColumns = fb && Array.isArray(fb.dateColumns) ? fb.dateColumns : [];

                        records.forEach(r => {
                            (r.values || []).forEach((val, vi) => {
                                if (val === '' || val === null || val === undefined) return;
                                const colName = dateColumns[vi] || ('题型' + (vi + 1));
                                rows.push([teacherName, cls.name, dateLabel, r.name, colName, String(val)]);
                            });
                        });
                    });
                });
            });

            if (rows.length <= 1) { alert('没有可导出的数据'); return; }
            const ws = XLSX.utils.aoa_to_sheet(rows);
            ws['!cols'] = [
                {wch: 10}, {wch: 16}, {wch: 14}, {wch: 8},
                {wch: 12}, {wch: 8}
            ];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '成绩明细');
            const dateStr = new Date().toLocaleDateString('zh-CN').replace(/\//g, '-');
            XLSX.writeFile(wb, `全部成绩明细_${dateStr}.xlsx`);
        };

                            const bg = (rec && rec.colors && rec.colors[colIdx]) ? rec.colors[colIdx] : '';

        window.adminCorrSave = async function() {
            const ctx = window._adminCorrContext;
            if (!ctx) return;
            const data = window._adminData || {};
            const u = data[ctx.teacherId];
            if (!u) return;
            const key = ctx.classId + '|' + ctx.date;
            const fb = u.feedback && u.feedback[key];
            if (!fb) return;
            const inputs = document.querySelectorAll('#adminCorrTableArea input');
            inputs.forEach(inp => {
                const name = inp.dataset.student;
                const col = parseInt(inp.dataset.col);
                const rec = fb.records.find(r => r.name === name);
                if (rec) {
                    if (!rec.values) rec.values = [];
                    rec.values[col] = inp.value.trim();
                }
            });
            // Try server API first
            try {
                const resp = await fetch(API_BASE + '/api/admin/save-correction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin_password: ADMIN_PASSWORD, user_id: ctx.teacherId, feedback: u.feedback })
                });
                if (resp.ok) {
                    document.getElementById('adminCorrStatus').textContent = '✅ 已保存';
                    setTimeout(() => { document.getElementById('adminCorrStatus').textContent = ''; }, 2000);
                    return;
                }
            } catch(e) {
                console.warn('Server API unreachable for save, falling back to direct Supabase');
            }

            // Fallback: direct Supabase
            const sk = await getServiceKey();
            if (!sk) return;
            try {
                const adminClient = window.supabase.createClient(SUPABASE_URL, sk, {
                    auth: { autoRefreshToken: false, persistSession: false, detectSessionInUrl: false }
                });
                const { error } = await adminClient.from('data_store').upsert({
                    user_id: ctx.teacherId, key: 'feedback', value: u.feedback,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'user_id,key' });

        function initFeedbackEntry(date){

                let templateColumns = [...cls.columns];

                    const firstEntry = getEntry(cls.id, firstDate);
                    if(firstEntry && firstEntry.dateColumns) {
                        templateColumns = [...firstEntry.dateColumns];
                    }
                }
                feedback[key] = {
                    records: cls.students.map(s => ({
                        name: s,
                        values: templateColumns.map(() => ''),
                        colors: templateColumns.map(() => '')
                    })),
                    dateColumns: templateColumns,
                    maxScores: templateColumns.map(extractMaxScore)
                };
            } else {
                const entry=feedback[key];
                if(Array.isArray(entry)) feedback[key]={records:entry,dateColumns:[...cls.columns],maxScores:cls.columns.map(extractMaxScore)};
                else {
                    if(!entry.dateColumns) entry.dateColumns=[...cls.columns];
                    if(!entry.maxScores) entry.maxScores=entry.dateColumns.map(extractMaxScore);
                    if(!entry.records) entry.records=cls.students.map(s=>({name:s,values:entry.dateColumns.map(()=>''),colors:entry.dateColumns.map(()=>'')}));

        function getCurrentDayData(){

            records=records.filter(r=>cls.students.includes(r.name));
            records.forEach(r=>{while(r.values.length<entry.dateColumns.length)r.values.push('');while(r.colors.length<entry.dateColumns.length)r.colors.push('');});
            const order={};cls.students.forEach((n,i)=>order[n]=i);

            document.querySelectorAll('.drag-handle').forEach(el => {

        let classDragData = null;
        let dragSuppressClick = false;

        function startClassDrag(e){
            // touch-action:none CSS already handles scroll prevention; only preventDefault for mouse to avoid text selection
            if (e.type === 'mousedown') e.preventDefault();
            e.stopPropagation();
            const w = e.currentTarget.closest('.class-card-wrapper');
            if(!w)return;
            const rects = Array.from(document.querySelectorAll('.class-card-wrapper')).map(el => ({ el, idx: parseInt(el.dataset.index), h: el.offsetHeight }));
            classDragData = {
                el: w, idx: parseInt(w.dataset.index), rects,
                startY: e.clientY !== undefined ? e.clientY : e.touches[0].clientY,
                currentTargetIdx: parseInt(w.dataset.index), moved: false
            };
            w.classList.add('dragging');
            document.addEventListener('mousemove', onClassDragMove);
            document.addEventListener('mouseup', onClassDragEnd);
            document.addEventListener('touchmove', onClassDragMove, { passive: false });
            document.addEventListener('touchend', onClassDragEnd);
        }

	        function onClassDragMove(e){
            if(!classDragData)return;
            e.preventDefault();
            const cy = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
            const dy = Math.abs(cy - classDragData.startY);
            if(!classDragData.moved && dy < 5)return;
            classDragData.moved = true;
            // 计算手指应该插入的位置（排除拖拽中的卡片，用中点判断）
            const allWrappers = document.querySelectorAll('.class-card-wrapper');
            let targetIdx = allWrappers.length - 1;
            for(let i = 0; i < allWrappers.length; i++) {
                if(allWrappers[i] === classDragData.el) continue;
                const r = allWrappers[i].getBoundingClientRect();
                if(cy < r.top + r.height / 2) { targetIdx = i; break; }
            }
            if(targetIdx !== classDragData.currentTargetIdx){
                classDragData.currentTargetIdx = targetIdx;
                // 让其他卡片让位
                const srcH = classDragData.rects[classDragData.idx].h + 8;
                allWrappers.forEach((el, i) => {
                    if(i === classDragData.idx)return;
                    let shiftY = 0;
                    if(classDragData.idx < targetIdx && i > classDragData.idx && i <= targetIdx) shiftY = -srcH;
                    if(classDragData.idx > targetIdx && i < classDragData.idx && i >= targetIdx) shiftY = srcH;
                    el.style.transform = shiftY ? `translateY(${shiftY}px)` : '';
                });
            }
            // 拖拽中的卡片跟随手指
            const offsetY = cy - classDragData.startY;
            classDragData.el.style.transform = `translateY(${offsetY}px)`;
            classDragData.el.style.zIndex = '999';
        }

        function onClassDragEnd(e){
            if(!classDragData)return;
            document.removeEventListener('mousemove', onClassDragMove);
            document.removeEventListener('mouseup', onClassDragEnd);
            document.removeEventListener('touchmove', onClassDragMove);
            document.removeEventListener('touchend', onClassDragEnd);
            classDragData.el.classList.remove('dragging');
            const toIdx = classDragData.currentTargetIdx;
            const fromIdx = classDragData.idx;
            // 清除所有transform
            document.querySelectorAll('.class-card-wrapper').forEach(w => w.style.transform = '');
            document.querySelectorAll('.class-card-wrapper').forEach(w => w.style.zIndex = '');
            if(classDragData.moved){
                dragSuppressClick = true;
                if(fromIdx !== toIdx){
                    const item = classes.splice(fromIdx, 1)[0];
                    classes.splice(toIdx, 0, item);
                    dbSet('classes', classes);
                    renderClassList();
                }
            }
            classDragData = null;
        }

        function findColumnIndexAndMax(entry, keyword) {
            if (!entry || !entry.dateColumns) return { idx: -1, maxScore: 0 };
            for (let i = 0; i < entry.dateColumns.length; i++) {
                if (columnContainsKeyword(entry.dateColumns[i], keyword)) return { idx: i, maxScore: extractMaxScore(entry.dateColumns[i]) };
            }
            return { idx: -1, maxScore: 0 };
        }
        function convertToNumber(value, maxScore){
            if(value===''||value===null||value===undefined) return null;
            const str = String(value).trim();
            if(str==='A++'||str==='A+') return maxScore || 100;
            if(str==='A') return maxScore ? Math.round(90/100*maxScore) : 90;
            if(str==='A-') return maxScore ? Math.round(80/100*maxScore) : 80;
            if(str==='✅'||str==='已完成') return maxScore || 100;
            const num = parseInt(str,10); return isNaN(num) ? 0 : num;
        }

            return new Promise((resolve) => {
                const reader = new FileReader();
                if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                    reader.onload = e => resolve(e.target.result); reader.readAsText(file);
                } else if (file.name.endsWith('.docx')) {
                    reader.onload = e => mammoth.extractRawText({ arrayBuffer: e.target.result }).then(r => resolve(r.value)).catch(() => resolve('无法解析 docx 文件'));
                    reader.readAsArrayBuffer(file);
                } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
                    reader.onload = e => {
                        const pdfjsLib = window['pdfjs-dist/build/pdf'];
                        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                        pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise.then(async pdf => {
                            let text = ''; for (let i = 1; i <= pdf.numPages; i++) { const page = await pdf.getPage(i); const content = await page.getTextContent(); text += content.items.map(item => item.str).join(' ') + '\n'; }
                            resolve(text);
                        }).catch(() => resolve('无法解析 PDF 文件'));
                    };
                    reader.readAsArrayBuffer(file);
                } else resolve('不支持的文件类型');
            });
        }

        window.startDragFloat = function(e) {
            if (e.target.matches('button, span, input, textarea, select')) return;
            isDraggingFloat = true; const btn = document.getElementById('floatBtn');
            dragStartX = e.touches ? e.touches[0].clientX : e.clientX;
            dragStartY = e.touches ? e.touches[0].clientY : e.clientY;
            startLeft = parseInt(btn.style.left) || floatBtnLeft;
            startTop = parseInt(btn.style.top) || floatBtnTop;
            btn.style.transition = 'none';
            e.preventDefault();
        };
        window.startDragPopup = function(e) {
            if (e.target.matches('button, span, input, textarea, select')) return;
            isDraggingPopup = true; const popup = document.getElementById('toolPopup');
            dragStartX = e.touches ? e.touches[0].clientX : e.clientX;
            dragStartY = e.touches ? e.touches[0].clientY : e.clientY;
            popupStartLeft = parseInt(popup.style.left) || popup.getBoundingClientRect().left;
            popupStartTop = parseInt(popup.style.top) || popup.getBoundingClientRect().top;
            popup.style.transition = 'none';
            e.preventDefault();
        };
        window.addEventListener('mousemove', function(e) {
            if (isDraggingFloat) { const btn = document.getElementById('floatBtn'); btn.style.left = (startLeft + e.clientX - dragStartX) + 'px'; btn.style.top = (startTop + e.clientY - dragStartY) + 'px'; }
            if (isDraggingPopup) { const popup = document.getElementById('toolPopup'); popup.style.left = (popupStartLeft + e.clientX - dragStartX) + 'px'; popup.style.top = (popupStartTop + e.clientY - dragStartY) + 'px'; }
        });
        window.addEventListener('touchmove', function(e) {
            if (isDraggingFloat) { const btn = document.getElementById('floatBtn'); btn.style.left = (startLeft + e.touches[0].clientX - dragStartX) + 'px'; btn.style.top = (startTop + e.touches[0].clientY - dragStartY) + 'px'; }
            if (isDraggingPopup) { const popup = document.getElementById('toolPopup'); popup.style.left = (popupStartLeft + e.touches[0].clientX - dragStartX) + 'px'; popup.style.top = (popupStartTop + e.touches[0].clientY - dragStartY) + 'px'; }
        }, { passive: false });
        window.addEventListener('mouseup', (e) => {
            if (isDraggingFloat) {
                const dx = Math.abs(e.clientX - dragStartX); const dy = Math.abs(e.clientY - dragStartY);
                if (dx < 5 && dy < 5) togglePopup();
                floatBtnLeft = parseInt(document.getElementById('floatBtn').style.left) || floatBtnLeft;
                floatBtnTop = parseInt(document.getElementById('floatBtn').style.top) || floatBtnTop;
            }
            isDraggingFloat = false; isDraggingPopup = false;
        });
        window.addEventListener('touchend', (e) => {
            if (isDraggingFloat) {
                const touch = e.changedTouches[0]; const dx = Math.abs(touch.clientX - dragStartX); const dy = Math.abs(touch.clientY - dragStartY);
                if (dx < 5 && dy < 5) togglePopup();
                floatBtnLeft = parseInt(document.getElementById('floatBtn').style.left) || floatBtnLeft;

        window.switchStatType = function() {
            const type = document.getElementById('statType').value;
            const targetSelect = document.getElementById('statTarget');
            const previousTarget = targetSelect.value;
            const cls = getCurrentClass();
            if (!cls) return;

            let optionsHTML = '';
            if (type === 'byColumn') {
                // 优先使用第一次课的实际列作为板块选项
                let columns = cls.columns;
                const dates = getDateList();
                if (dates.length) {
                    const firstEntry = getEntry(cls.id, dates[0]);
                    if (firstEntry && firstEntry.dateColumns && firstEntry.dateColumns.length) {
                        columns = firstEntry.dateColumns;
                    }
                }
                optionsHTML = columns.map(col => {
                    const pure = stripMaxScore(col);
                    return `<option value="${escapeHtml(pure)}">${escapeHtml(pure)}</option>`;
                }).join('');
            } else {
                optionsHTML = cls.students.map(s =>
                    `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`
                ).join('');
            }

            if (!optionsHTML) {
                targetSelect.innerHTML = '';
                document.getElementById('statTableWrapper').innerHTML = '<div class="empty-state">暂无数据</div>';
                return;
            }

            targetSelect.innerHTML = optionsHTML;
            // 保留用户之前的选择
            if (previousTarget && [...targetSelect.options].some(o => o.value === previousTarget)) {
                targetSelect.value = previousTarget;
            } else {
                targetSelect.selectedIndex = 0;
            }
            window.renderStatTable();
        };

        window.renderStatTable = function() {

            }
        };

        function getAutoBackground(val, maxScore) {
            if (val === '' || val === null) return '';
            const str = String(val).trim();
            if (str === '未完成' || str === '❌' || str === '×') return '#f8d7da';
            if (maxScore > 0) {
                const score = convertToNumber(val, maxScore);
                if (score !== null && score !== undefined) {
                    if (score === 0) return '#f8d7da';
                    if (score === maxScore) return '#d4edda';
                }
            }
            return null;
        }

        function renderStatTableByColumn(colKeyword) {
            const cls = getCurrentClass();
            if (!cls) return;
            const dates = getDateList();
            const students = cls.students;

            // 以第一次课的列索引为基准，保证所有课次统一对齐
            let refIdx = -1;
            const firstDate = dates[0];
            if (firstDate) {
                const firstEntry = getEntry(cls.id, firstDate);
                if (firstEntry) {
                    refIdx = firstEntry.dateColumns.findIndex(c => columnContainsKeyword(c, colKeyword));
                }
            }

            let html = `<h3 style="text-align:center;margin-bottom:8px;">${escapeHtml(colKeyword)} 学情总结</h3>`;
            html += '<div class="stat-table-wrap"><table class="stat-table"><thead>';
            html += '<tr><th style="width:70px">学生</th>';
            dates.forEach(d => html += `<th style="width:110px">${escapeHtml(d)}</th>`);
            html += '</tr></thead><tbody>';

            students.forEach(stu => {
                html += `<tr><td>${escapeHtml(stu)}</td>`;
                dates.forEach(d => {
                    const entry = getEntry(cls.id, d);
                    let val = '', bg = '', displayVal = '';
                    if (entry) {
                        // 优先使用第一次课的索引作为统一基准，回退到关键词匹配
                        let idx = refIdx;
                        if (idx === -1 || idx >= entry.dateColumns.length || !columnContainsKeyword(entry.dateColumns[idx], colKeyword)) {
                            idx = entry.dateColumns.findIndex(c => columnContainsKeyword(c, colKeyword));
                        }
                        if (idx !== -1) {
                            const rec = entry.records.find(r => r.name === stu);
                            if (rec) {
                                val = rec.values[idx] || '';
                                bg = (rec.colors && rec.colors[idx]) ? rec.colors[idx] : '';
                            }
                            const maxScore = extractMaxScore(entry.dateColumns[idx]);
                            displayVal = val;
                            if (val !== '' && maxScore > 0 && /^\d+(\.\d+)?$/.test(String(val).trim())) {
                                displayVal = String(val).trim() + '/' + maxScore;
                            }
                            const autoBg = getAutoBackground(val, maxScore);
                            if (autoBg) bg = autoBg;
                        }
                    }
                    html += `<td style="background:${bg}">${escapeHtml(displayVal)}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            document.getElementById('statTableWrapper').innerHTML = html;
        }

        function renderStatTableByStudent(studentName) {
            const cls = getCurrentClass();
            if (!cls) return;
            const dates = getDateList();

            let columns = [];
            const firstDate = dates[0];
            if (firstDate) {
                const firstEntry = getEntry(cls.id, firstDate);
                if (firstEntry) {
                    columns = [...firstEntry.dateColumns];
                }
            }
            if (!columns.length) {
                const allCols = new Set();
                dates.forEach(d => {
                    const entry = getEntry(cls.id, d);
                    if (entry) entry.dateColumns.forEach(c => allCols.add(c));
                });
                columns = Array.from(allCols).sort(naturalSort);
            }

            let html = `<h3 style="text-align:center;margin-bottom:8px;">${escapeHtml(studentName)} 学情统计</h3>`;
            html += '<div class="stat-table-wrap"><table class="stat-table"><thead><tr><th style="width:70px">日期</th>';
            columns.forEach(col => html += `<th style="width:110px">${escapeHtml(stripMaxScore(col))}</th>`);
            html += '</tr></thead><tbody>';

            dates.forEach(d => {
                html += `<tr><td>${escapeHtml(d)}</td>`;
                const entry = getEntry(cls.id, d);
                const rec = entry ? entry.records.find(r => r.name === studentName) : null;
                columns.forEach(colRaw => {
                    let val = '', bg = '';
                    if (entry && rec) {
                        const keyword = stripMaxScore(colRaw);
                        const matchedCol = entry.dateColumns.find(c => columnContainsKeyword(c, keyword));
                        if (matchedCol) {
                            const idx = entry.dateColumns.indexOf(matchedCol);
                            if (idx !== -1) {
                                val = rec.values[idx] || '';
                                bg = (rec.colors && rec.colors[idx]) ? rec.colors[idx] : '';
                            }
                            const maxScore = extractMaxScore(matchedCol);
                            let displayVal = val;
                            if (val !== '' && maxScore > 0 && /^\d+(\.\d+)?$/.test(String(val).trim())) {
                                displayVal = String(val).trim() + '/' + maxScore;
                            }
                            const autoBg = getAutoBackground(val, maxScore);
                            if (autoBg) bg = autoBg;
                            html += `<td style="background:${bg}">${escapeHtml(displayVal)}</td>`;
                            return;
                        }
                    }
                    html += `<td></td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            document.getElementById('statTableWrapper').innerHTML = html;
        }

        window.exportStatExcel = function() {
            const target = document.getElementById('statTarget').value;
            if (!target) return alert('请先选择统计目标');
            const title = '统计表_' + target;
            const wrapper = document.getElementById('statTableWrapper');
            const table = wrapper.querySelector('.stat-table');
            if (!table) return;
            const clone = table.cloneNode(true);
            clone.querySelectorAll('th,td').forEach(function(c){c.style.position='';c.style.left='';c.style.zIndex='';});
            var styleEl=document.createElement('style');
            styleEl.textContent='@page { size: landscape; margin: 10mm; } body{font-family:Arial;text-align:center}h3{text-align:center;margin:16px 0}table{border-collapse:collapse;margin:0 auto;table-layout:auto;width:auto}th{padding:10px 12px;border:1px solid #bfdbfe;text-align:center;background:#eff6ff;color:#1e40af;white-space:normal;word-break:break-word;mso-number-format:\\@;}td{padding:8px 10px;border:1px solid #bfdbfe;text-align:center;white-space:normal;word-break:break-word;mso-number-format:\\@;}tr:nth-child(even) td{background:#f8fafc}';
            var finalHtml='<html><head><meta charset="utf-8"><title>'+escapeHtml(title)+'</title>'+styleEl.outerHTML+'</head><body>'+clone.outerHTML+'</body></html>';
            const blob = new Blob([finalHtml], { type: 'application/vnd.ms-excel' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = title + '.xls';
            a.click();
        };

        window.exportStatImage = function() {
            const wrapper = document.getElementById('statTableWrapper');
            const table = wrapper.querySelector('.stat-table');
            const wrapDiv = wrapper.querySelector('.stat-table-wrap');
            const origStyle = wrapper.getAttribute('style') || '';
            const origTblStyle = table ? table.getAttribute('style') || '' : '';
            const origWrapStyle = wrapDiv ? wrapDiv.getAttribute('style') || '' : '';
            const origParentStyle = wrapper.parentNode.style.cssText;

            // 保存所有单元格样式，临时禁止换行
            const allCells = table ? table.querySelectorAll('th,td') : [];
            const origCellStyles = [];
            allCells.forEach(cell => {
                origCellStyles.push({ el: cell, ws: cell.style.whiteSpace, mw: cell.style.maxWidth });
                cell.style.whiteSpace = 'nowrap';
                cell.style.maxWidth = 'none';
            });

            // 解除所有限制，让表格完全展开
            wrapper.parentNode.style.overflow = 'visible';
            wrapper.parentNode.style.maxHeight = 'none';
            wrapper.style.overflow = 'visible';
            wrapper.style.maxHeight = 'none';
            wrapper.style.width = 'auto';
            wrapper.style.maxWidth = 'none';
            wrapper.style.borderRadius = '0';
            wrapper.style.margin = '0';
            if (wrapDiv) {
                wrapDiv.style.overflow = 'visible';
                wrapDiv.style.maxHeight = 'none';
            }
            if (table) {
                table.style.tableLayout = 'auto';
                table.style.width = 'auto';
                table.style.minWidth = 'auto';
            }

            setTimeout(() => {
                let w = wrapper.scrollWidth;
                let h = wrapper.scrollHeight;
                wrapper.style.width = (w + 4) + 'px';
                w = wrapper.scrollWidth;
                h = wrapper.scrollHeight;

                html2canvas(wrapper, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    width: w + 8,
                    height: h + 24,
                    windowWidth: w + 8,
                    windowHeight: h + 24
                }).then(canvas => {
                    wrapper.setAttribute('style', origStyle);
                    if (table) table.setAttribute('style', origTblStyle);
                    if (wrapDiv) wrapDiv.setAttribute('style', origWrapStyle);
                    wrapper.parentNode.style.cssText = origParentStyle;
                    origCellStyles.forEach(s => { s.el.style.whiteSpace = s.ws; s.el.style.maxWidth = s.mw; });

                    canvas.toBlob(blob => {
                        const target = document.getElementById('statTarget').value;
                        const title = `统计表_${target || '未选择'}`;
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `${title}.png`;
                        a.click();
                    });
                });
            }, 50);
        };

        // 启动：检查 Supabase 会话
        window.addEventListener('DOMContentLoaded', async () => {
            // 请求浏览器持久存储权限
            if (navigator.storage && navigator.storage.persist) {
                navigator.storage.persist().then(granted => { if (granted) console.log('持久存储已启用'); });
            }

            // 检查是否已有 Supabase 会话
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session && session.user) {
                    await onLoginSuccess(session.user);
                }
            } catch(e) {
                // Supabase 不可用时，登录页已默认显示，无需额外操作
                console.warn('Session check failed:', e.message);
            }

            // 键盘弹出时浮动按钮上移
            let floatSavedTop = floatBtnTop;
            document.addEventListener('focusin', e => {
                const tag = e.target.tagName;
                if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.closest('.cell-input')) {
                    const floatBtn = document.getElementById('floatBtn');
                    if (floatBtn) { floatSavedTop = parseInt(floatBtn.style.top) || floatBtnTop; floatBtn.style.top = '10px'; floatBtn.style.bottom = 'auto'; }
                }
            });
            document.addEventListener('focusout', e => {
                const related = e.relatedTarget;
                if (!related || (related.tagName !== 'INPUT' && related.tagName !== 'TEXTAREA' && !related.closest('.cell-input'))) {
                    setTimeout(() => {
                        const floatBtn = document.getElementById('floatBtn');
                        if (floatBtn && !document.activeElement || (document.activeElement && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA')) {
                            floatBtn.style.top = floatSavedTop + 'px'; floatBtn.style.bottom = 'auto';
                        }
                    }, 200);
                }
            });
            // 键盘弹出/收起时，确保活跃单元格不被遮挡
            if (window.visualViewport) {
                var vvTimer;
                window.visualViewport.addEventListener('resize', function() {
                    clearTimeout(vvTimer);
                    if (activeCell && document.activeElement === activeCell) {
                        vvTimer = setTimeout(function(){ scrollCellIntoView(activeCell); }, 150);
                    }
                });
            }
        });
        window.addEventListener('keydown', e => {
            if ((e.ctrlKey||e.metaKey)&&e.key==='z') { e.preventDefault(); undo(); }
            if ((e.ctrlKey||e.metaKey)&&e.key==='y') { e.preventDefault(); redo(); }
        });
    })();
    </script>
